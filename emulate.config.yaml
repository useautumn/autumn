# Local OAuth emulator for agent worktrees.
# Run once on the host: `bash scripts/setup/start-emulate.sh` (or `npx emulate --portless --seed emulate.config.yaml`).
# No oauth_clients are seeded — emulate then skips client_id/redirect_uri validation, so
# every worktree's BETTER_AUTH_URL/api/auth/callback/google is accepted automatically.
google:
  users:
    - uid: emulate-agent-uid-001
      email: agent@autumn.test
      name: Agent Autumn
      given_name: Agent
      family_name: Autumn
      email_verified: true
      locale: en
