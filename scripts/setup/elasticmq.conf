include classpath("application.conf")

node-address {
  protocol = http
  host = "*"
  port = 9324
  context-path = ""
}

rest-sqs {
  enabled = true
  bind-port = 9324
  bind-hostname = "0.0.0.0"
  sqs-limits = strict
}

generate-node-address = false

queues {
  "autumn.fifo" {
    fifo = true
    contentBasedDeduplication = true
  }
  "autumn-track.fifo" {
    fifo = true
    contentBasedDeduplication = true
  }
  "autumn-track-async.fifo" {
    fifo = true
    contentBasedDeduplication = true
  }
}
