id = "autumn.sw"
name = "Autumn Sandbox Worktrees"
version = "0.1.0"
min_herdr_version = "0.7.0"
description = "When a new @autumn worktree is created, launch the sandbox-worktree picker (local / exe.dev / modal) in its first pane."
platforms = ["macos", "linux"]

# Subscribe to several lifecycle events because which one the TUI "New worktree"
# emits varies by herdr build. The handler logs every event, but only PROMPTS for
# a fresh, unconfigured @autumn worktree (idempotent via the sw registry + marker),
# so re-opening or adding tabs to a configured worktree is a no-op.
[[events]]
on = "worktree.created"
command = ["bun", "handler.ts"]

[[events]]
on = "worktree.opened"
command = ["bun", "handler.ts"]

[[events]]
on = "tab.created"
command = ["bun", "handler.ts"]
