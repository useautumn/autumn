name: SDK Publish

on:
  push:
    branches:
      - main
    paths:
      - "packages/autumn-js/**"
      - "packages/openapi/**"

  workflow_dispatch:
    inputs:
      dry-run:
        description: "Dry run (no actual publish)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"
      version-bump:
        description: "Version bump type (for manual triggers)"
        required: false
        default: "patch"
        type: choice
        options:
          - "patch"
          - "minor"
          - "major"
      test-package:
        description: "Publish to @useautumn/js-test instead (for testing)"
        required: false
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  publish:
    uses: ./.github/workflows/npm-publish.yml
    permissions:
      id-token: write
      contents: write
    with:
      package-dir: packages/autumn-js
      commit-paths: packages/autumn-js packages/openapi
      install-speakeasy: true
      pre-build-command: bun api
      build-command: bun js:build
      typecheck-command: bun js:ts
      version-bump: ${{ github.event_name == 'workflow_dispatch' && inputs.version-bump || '' }}
      dry-run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry-run || 'false' }}
      publish-name-override: ${{ github.event_name == 'workflow_dispatch' && inputs.test-package == 'true' && '@useautumn/js-test' || '' }}
    secrets:
      SPEAKEASY_API_KEY: ${{ secrets.SPEAKEASY_API_KEY }}
