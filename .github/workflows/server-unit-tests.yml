name: Server Unit Tests

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Check changed files
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      server: ${{ steps.filter.outputs.server }}
    steps:
      - name: Check changed files
        id: filter
        uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050
        with:
          filters: |
            server:
              - "server/**"
              - "shared/**"
              - "package.json"
              - "bun.lock"
              - ".github/workflows/server-unit-tests.yml"

  unit-tests:
    name: Unit Tests
    needs: changes
    if: needs.changes.outputs.server == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run unit tests
        run: |
          set +e
          ATTEMPT=1
          MAX_ATTEMPTS=2
          
          while [ $ATTEMPT -le $MAX_ATTEMPTS ]; do
            echo "Attempt $ATTEMPT of $MAX_ATTEMPTS..."
            
            # Run the test and capture output
            OUTPUT=$(bun test --isolate tests/unit 2>&1)
            EXIT_CODE=$?
            
            # Print the output
            echo "$OUTPUT"
            
            # Check if the test passed
            if [ $EXIT_CODE -eq 0 ]; then
              echo "Tests passed!"
              exit 0
            fi
            
            # Check if the failure was due to a segfault
            if echo "$OUTPUT" | grep -iq "segmentation fault\|Segmentation fault\|bun:.*SIGSEGV\|core dumped"; then
              if [ $ATTEMPT -lt $MAX_ATTEMPTS ]; then
                echo "Detected bun segfault. Retrying..."
                ATTEMPT=$((ATTEMPT + 1))
                sleep 2
                continue
              else
                echo "Detected bun segfault on final attempt. Failing."
                exit $EXIT_CODE
              fi
            else
              # Non-segfault failure, exit immediately
              echo "Test failure (not a segfault). Exit code: $EXIT_CODE"
              exit $EXIT_CODE
            fi
          done
          
          exit 1
        working-directory: server
