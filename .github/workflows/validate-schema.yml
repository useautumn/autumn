name: Validate Production Schema

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  validate-schema:
    name: Validate Schema
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install

      - name: Validate schema
        env:
          DATABASE_URL: ${{ secrets.DATABASE_READ_ONLY_URL }}
          DB_MAX_CONNECTIONS: 1
          NODE_OPTIONS: --dns-result-order=ipv4first
        run: |
          bun -e '
            const raw = process.env.DATABASE_URL ?? "";
            const lines = raw.split(/\r?\n/);
            const envLine = lines.find((line) =>
              /^[\s]*(?:export[\s]+)?(?:DATABASE_URL|DATABASE_READ_ONLY_URL)[\s]*=/.test(line),
            );

            const stripWrappingQuotes = (value) => {
              const trimmed = value.trim();
              if (
                (trimmed.startsWith("\"") && trimmed.endsWith("\"")) ||
                (trimmed.startsWith("'\\''") && trimmed.endsWith("'\\''"))
              ) {
                return trimmed.slice(1, -1);
              }
              return trimmed;
            };

            const candidate = stripWrappingQuotes(
              (envLine ?? raw).replace(
                /^[\s]*(?:export[\s]+)?(?:DATABASE_URL|DATABASE_READ_ONLY_URL)[\s]*=/,
                "",
              ),
            );

            const sanitizedStart = (value) => {
              const start = value.trim().slice(0, 96);
              const match = start.match(/^(postgres(?:ql)?:\/\/)(.*)$/);
              if (!match) return start.slice(0, 24);

              const [, scheme, rest] = match;
              const authority = rest.split("/", 1)[0];
              const hostish = authority.includes("@")
                ? authority.slice(authority.lastIndexOf("@") + 1)
                : authority.includes(":")
                  ? "<redacted-authority>"
                  : authority;
              return `${scheme}${authority.includes("@") ? "<credentials>@" : ""}${hostish.slice(0, 24)}`;
            };

            const schemeMatch = candidate.match(/^postgres(?:ql)?:\/\//);
            const authority = candidate
              .replace(/^postgres(?:ql)?:\/\//, "")
              .split("/", 1)[0];

            console.error(`DATABASE_READ_ONLY_URL raw length: ${raw.length}`);
            console.error(`DATABASE_READ_ONLY_URL contains multiple lines: ${lines.length > 1 ? "yes" : "no"}`);
            console.error(`DATABASE_READ_ONLY_URL normalized length: ${candidate.length}`);
            console.error(`DATABASE_READ_ONLY_URL sanitized start: ${sanitizedStart(candidate)}`);
            console.error(`DATABASE_READ_ONLY_URL starts with postgres scheme: ${schemeMatch ? "yes" : "no"}`);

            try {
              const url = new URL(candidate);
              const validProtocol = ["postgres:", "postgresql:"].includes(url.protocol);

              console.error(`DATABASE_READ_ONLY_URL format: ${validProtocol ? "valid postgres URL" : `invalid protocol ${url.protocol}`}`);
              console.error(`DATABASE_READ_ONLY_URL host: ${url.hostname || "missing"}`);
              console.error(`DATABASE_READ_ONLY_URL port: ${url.port || "5432"}`);

              if (!validProtocol || !url.hostname) process.exit(1);
              process.stdout.write(candidate);
            } catch (error) {
              console.error(`DATABASE_READ_ONLY_URL format: invalid URL (${error?.code ?? error?.name ?? "unknown"})`);
              console.error(`DATABASE_READ_ONLY_URL authority contains @: ${authority.includes("@") ? "yes" : "no"}`);
              console.error(`DATABASE_READ_ONLY_URL authority contains #: ${authority.includes("#") ? "yes - encode as %23" : "no"}`);
              console.error(`DATABASE_READ_ONLY_URL authority contains whitespace: ${/\s/.test(authority) ? "yes - remove it or percent-encode it" : "no"}`);
              process.exit(1);
            }
          ' > "$RUNNER_TEMP/database-url"
          DATABASE_URL="$(<"$RUNNER_TEMP/database-url")"
          export DATABASE_URL

          for i in 1 2 3; do
            bun -e '
              import { lookup } from "node:dns/promises";
              import net from "node:net";

              try {
                const databaseUrl = process.env.DATABASE_URL?.trim();
                if (!databaseUrl) {
                  throw new Error("DATABASE_READ_ONLY_URL secret is empty");
                }

                const url = new URL(databaseUrl);
                if (!["postgres:", "postgresql:"].includes(url.protocol)) {
                  throw new Error("DATABASE_READ_ONLY_URL must be a postgres URL");
                }

                await lookup(url.hostname);
                await new Promise((resolve, reject) => {
                  const socket = net.connect(Number(url.port || 5432), url.hostname);
                  socket.setTimeout(10_000);
                  socket.once("connect", () => {
                    socket.end();
                    resolve();
                  });
                  socket.once("timeout", () => reject(new Error("database TCP connection timed out")));
                  socket.once("error", reject);
                });
              } catch (error) {
                console.error(`Database preflight failed: ${error?.message ?? error}`);
                process.exit(1);
              }
            ' && bun scripts/migrations/validate-schema.ts && exit 0
            sleep $((i * 10))
          done

          exit 1
