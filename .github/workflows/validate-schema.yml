name: Validate Production Schema

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  validate-schema:
    name: Validate Schema
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install

      - name: Validate schema
        env:
          DATABASE_URL: ${{ secrets.DATABASE_READ_ONLY_URL }}
          DB_MAX_CONNECTIONS: 1
          NODE_OPTIONS: --dns-result-order=ipv4first
        run: |
          DATABASE_URL="$(printf '%s' "$DATABASE_URL" | awk -F= '/^(DATABASE_URL|DATABASE_READ_ONLY_URL)=/ { sub(/^[^=]*=/, ""); print; exit } NR == 1 { print; exit }')"
          DATABASE_URL="${DATABASE_URL%\"}"
          DATABASE_URL="${DATABASE_URL#\"}"
          DATABASE_URL="${DATABASE_URL%\'}"
          DATABASE_URL="${DATABASE_URL#\'}"
          export DATABASE_URL

          bun -e '
            const databaseUrl = process.env.DATABASE_URL?.trim();
            if (!databaseUrl) {
              console.error("DATABASE_READ_ONLY_URL format: empty");
              process.exit(1);
            }

            try {
              const url = new URL(databaseUrl);
              console.log(`DATABASE_READ_ONLY_URL format: ${["postgres:", "postgresql:"].includes(url.protocol) ? "valid postgres URL" : `invalid protocol ${url.protocol}`}`);
              console.log(`DATABASE_READ_ONLY_URL host: ${url.hostname || "missing"}`);
              console.log(`DATABASE_READ_ONLY_URL port: ${url.port || "5432"}`);
              if (!["postgres:", "postgresql:"].includes(url.protocol) || !url.hostname) {
                process.exit(1);
              }
            } catch {
              console.error("DATABASE_READ_ONLY_URL format: invalid URL");
              process.exit(1);
            }
          '

          for i in 1 2 3; do
            bun -e '
              import { lookup } from "node:dns/promises";
              import net from "node:net";

              try {
                const databaseUrl = process.env.DATABASE_URL?.trim();
                if (!databaseUrl) {
                  throw new Error("DATABASE_READ_ONLY_URL secret is empty");
                }

                const url = new URL(databaseUrl);
                if (!["postgres:", "postgresql:"].includes(url.protocol)) {
                  throw new Error("DATABASE_READ_ONLY_URL must be a postgres URL");
                }

                await lookup(url.hostname);
                await new Promise((resolve, reject) => {
                  const socket = net.connect(Number(url.port || 5432), url.hostname);
                  socket.setTimeout(10_000);
                  socket.once("connect", () => {
                    socket.end();
                    resolve();
                  });
                  socket.once("timeout", () => reject(new Error("database TCP connection timed out")));
                  socket.once("error", reject);
                });
              } catch (error) {
                console.error(`Database preflight failed: ${error?.message ?? error}`);
                process.exit(1);
              }
            ' && bun scripts/migrations/validate-schema.ts && exit 0
            sleep $((i * 10))
          done

          exit 1
