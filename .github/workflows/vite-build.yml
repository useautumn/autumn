name: Vite Build Check

on:
  pull_request:

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Check changed files
    runs-on: blacksmith-2vcpu-ubuntu-2404
    outputs:
      vite: ${{ steps.filter.outputs.vite }}
    steps:
      - name: Check changed files
        id: filter
        uses: dorny/paths-filter@6852f92c20ea7fd3b0c25de3b5112db3a98da050
        with:
          filters: |
            vite:
              - "vite/**"
              - "shared/**"
              - "packages/atmn/**"
              - "packages/autumn-js/**"
              - "package.json"
              - "bun.lock"
              - ".github/workflows/vite-build.yml"

  build:
    name: Build & Type Check
    needs: changes
    if: needs.changes.outputs.vite == 'true'
    runs-on: blacksmith-8vcpu-ubuntu-2404

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run TypeScript type check
        run: cd vite && bunx tsc --noEmit

      - name: Build Vite
        run: cd vite && bunx vite build
