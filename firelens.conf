[SERVICE]
    # Flightcontrol prepends its own SERVICE block. The production AWS Fluent
    # Bit image accepts an additional block and needs this file registered
    # before the parser filter can use its built-in `json` parser.
    Parsers_File /fluent-bit/etc/parsers.conf

[FILTER]
    Name modify
    Match *
    Condition Key_value_matches container_name .*-server-.*
    Add type server

[FILTER]
    Name modify
    Match *
    Condition Key_value_matches container_name .*-workers-.*
    Add type workers

[FILTER]
    Name modify
    Match *
    Condition Key_value_matches container_name .*-cron-.*
    Add type cron

[FILTER]
    Name modify
    Match *
    Condition Key_value_matches container_name .*-leaf-.*
    Add type leaf

[FILTER]
    Name modify
    Match *
    Add region ${AWS_REGION}

[FILTER]
    Name parser
    Match *-firelens-*
    Key_Name log
    Parser json
    Reserve_Data On
    Preserve_Key Off

[FILTER]
    Name rewrite_tag
    Match *-firelens-*
    Rule $level ^(TRACE|DEBUG|INFO|WARN|ERROR|FATAL)$ axiom_express false
    Emitter_Name axiom_express_emitter
    Emitter_Storage.type memory
    Emitter_Mem_Buf_Limit 10M

[OUTPUT]
    Name http
    Match axiom_express
    Host us-east-1.aws.edge.axiom.co
    Port 443
    URI /v1/ingest/express
    Format json
    TLS On
    json_date_key _time
    json_date_format iso8601
    Header Authorization Bearer ${AXIOM_TOKEN}
    Header Content-Type application/json
    retry_limit 5
    net.dns.mode TCP

[OUTPUT]
    Name http
    Match *-firelens-*
    Host us-east-1.aws.edge.axiom.co
    Port 443
    URI /v1/ingest/ecs
    Format json
    TLS On
    json_date_key _time
    json_date_format iso8601
    Header Authorization Bearer ${AXIOM_TOKEN}
    Header Content-Type application/json
    retry_limit 5
    net.dns.mode TCP
