  /v1/plans.get:
    post:
      operationId: getPlan
      summary: Get a plan
      description: >-
        Retrieves a single plan by its ID.


        Use this to fetch the full configuration of a specific plan, including
        its features and pricing.
      tags:
        - plans
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                plan_id:
                  type: string
                  minLength: 1
                  description: The ID of the plan to retrieve.
                version:
                  type: number
                  description: The version of the plan to get. Defaults to the latest version.
              required:
                - plan_id
              title: GetPlanParams
              examples:
                - &a13
                  plan_id: pro_plan
                - plan_id: pro_plan
                  version: 2
            example: *a13
      responses:
