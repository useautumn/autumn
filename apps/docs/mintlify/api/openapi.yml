info:
  title: Autumn API
  version: 2.3.0
servers:
  - url: https://api.useautumn.com
    description: Production server
openapi: 3.1.0
components:
  schemas:
    CustomerId:
      type: string
      title: CustomerId
      description: Your unique identifier for the customer
    CustomerData:
      type: object
      properties:
        name:
          anyOf:
            - type: string
            - type: "null"
          description: Customer's name
        email:
          anyOf:
            - type: string
              format: email
            - type: "null"
          description: Customer's email address
        fingerprint:
          anyOf:
            - type: string
            - type: "null"
          description: Unique identifier (eg, serial number) to detect duplicate customers
            and prevent free trial abuse
        metadata:
          anyOf:
            - type: object
              propertyNames:
                type: string
              additionalProperties: {}
            - type: "null"
          description: Additional metadata for the customer
        stripe_id:
          anyOf:
            - type: string
            - type: "null"
          description: Stripe customer ID if you already have one
        create_in_stripe:
          type: boolean
          description: Whether to create the customer in Stripe
        auto_enable_plan_id:
          type: string
          description: The ID of the free plan to auto-enable for the customer
        send_email_receipts:
          type: boolean
          description: Whether to send email receipts to this customer
        currency:
          anyOf:
            - type: string
            - type: "null"
          description: Currency to bill this customer in (e.g. usd, eur). Defaults to the
            organization's default currency.
        billing_controls:
          type: object
          properties:
            auto_topups:
              type: array
              items:
                type: object
                properties:
                  feature_id:
                    type: string
                    description: The ID of the feature (credit balance) to auto top-up.
                  enabled:
                    type: boolean
                    default: false
                    description: Whether auto top-up is enabled.
                  threshold:
                    type: number
                    minimum: 0
                    description: When the balance drops below this threshold, an auto top-up will be
                      purchased.
                  quantity:
                    type: number
                    minimum: 1
                    description: Amount of credits to add per auto top-up.
                  purchase_limit:
                    type: object
                    properties:
                      interval:
                        enum:
                          - hour
                          - day
                          - week
                          - month
                        type: string
                        description: The time interval for the purchase limit window.
                      interval_count:
                        type: number
                        minimum: 1
                        default: 1
                        description: Number of intervals in the purchase limit window.
                      limit:
                        type: number
                        minimum: 1
                        description: Maximum number of auto top-ups allowed within the interval.
                    required:
                      - interval
                      - limit
                    description: Optional rate limit to cap how often auto top-ups occur.
                  invoice_mode:
                    type: boolean
                    description: When true, auto top-up creates a send_invoice invoice instead of
                      auto-charging.
                required:
                  - feature_id
                  - threshold
                  - quantity
              description: List of auto top-up configurations per feature.
            spend_limits:
              type: array
              items:
                type: object
                properties:
                  feature_id:
                    type: string
                    description: Optional feature ID this spend limit applies to.
                  enabled:
                    type: boolean
                    default: false
                    description: Whether the overage spend limit is enabled.
                  limit_type:
                    enum:
                      - absolute
                      - usage_percentage
                    type: string
                    description: "How overage_limit is interpreted: an absolute overage cap
                      (default) or a percentage of the main-plan allowance."
                  overage_limit:
                    type: number
                    minimum: 0
                    description: "Overage cap for the feature: absolute units, or a percent (e.g.
                      120) when limit_type is usage_percentage."
                  skip_overage_billing:
                    type: boolean
                    description: When true, overage for this feature is not posted to Stripe. Usage
                      tracking and balance resets still behave normally.
              description: List of overage spend limits per feature (caps overage spend).
            usage_limits:
              type: array
              items:
                type: object
                properties:
                  feature_id:
                    type: string
                    description: The feature this usage limit applies to.
                  enabled:
                    type: boolean
                    default: true
                    description: Whether this usage limit is enabled.
                  limit:
                    type: number
                    minimum: 0
                    description: Maximum units allowed per interval.
                  interval:
                    enum:
                      - day
                      - week
                      - month
                      - year
                    type: string
                    description: Interval for the cap, aligned to the customer's billing cycle.
                  filter:
                    type: object
                    properties:
                      properties:
                        type: object
                        propertyNames:
                          type: string
                          minLength: 1
                          maxLength: 64
                        additionalProperties:
                          anyOf:
                            - type: string
                              minLength: 1
                              maxLength: 128
                            - type: number
                            - type: boolean
                    required:
                      - properties
                    description: When set, only usage from events whose properties match counts
                      toward this cap. Omit to count all usage of the feature.
                required:
                  - feature_id
                  - limit
                  - interval
              description: List of hard usage caps per feature (max units per interval).
            usage_alerts:
              type: array
              items:
                type: object
                properties:
                  feature_id:
                    type: string
                    description: The feature ID this alert applies to.
                  enabled:
                    type: boolean
                    default: true
                    description: Whether this usage alert is enabled.
                  threshold:
                    type: number
                    minimum: 0
                    description: The threshold value that triggers the alert. For usage or
                      remaining, this is an absolute count. For usage_percentage
                      or remaining_percentage, this is a percentage (0-100).
                  threshold_type:
                    enum:
                      - usage
                      - usage_percentage
                      - remaining
                      - remaining_percentage
                    type: string
                    description: Whether the threshold is an absolute count or a percentage of the
                      usage allowance or remaining balance.
                  name:
                    type: string
                    description: Optional user-defined label to distinguish multiple alerts on the
                      same feature.
                required:
                  - threshold
                  - threshold_type
              description: List of usage alert configurations per feature.
            overage_allowed:
              type: array
              items:
                type: object
                properties:
                  feature_id:
                    type: string
                    description: The feature ID this overage allowed control applies to.
                  enabled:
                    type: boolean
                    default: false
                    description: Whether overage is allowed for this feature.
                required:
                  - feature_id
              description: List of overage allowed controls per feature. When enabled, usage
                can exceed balance.
          description: Billing controls for the customer (auto top-ups, etc.)
        config:
          type: object
          properties:
            disable_pooled_balance:
              type: boolean
              description: Whether to disable the shared customer-level pool for entities.
            disable_overage_billing:
              type: boolean
              description: Stops Autumn from posting usage-overage line items to Stripe for
                this customer. Check/track and balance resets still behave
                normally. When set, this overrides the organization-level
                disable_overage_billing setting.
          description: Miscellaneous configurations for the customer.
      title: CustomerData
      description: Customer details to set when creating a customer
    CustomerExpand:
      enum:
        - invoices
        - trials_used
        - rewards
        - entities
        - referrals
        - payment_method
        - subscriptions.plan
        - purchases.plan
        - balances.feature
        - flags.feature
        - billing_controls.auto_topups.purchase_limit
      type: string
      title: CustomerExpand
    Customer:
      type: object
      properties:
        id:
          anyOf:
            - type: string
            - type: "null"
          description: Your unique identifier for the customer.
        name:
          anyOf:
            - type: string
            - type: "null"
          description: The name of the customer.
        email:
          anyOf:
            - type: string
            - type: "null"
          description: The email address of the customer.
        created_at:
          type: number
          description: Timestamp of customer creation in milliseconds since epoch.
        fingerprint:
          anyOf:
            - type: string
            - type: "null"
          description: "A unique identifier (eg. serial number) to de-duplicate customers
            across devices or browsers. For example: apple device ID."
        stripe_id:
          anyOf:
            - type: string
            - type: "null"
          description: Stripe customer ID.
        env:
          enum:
            - sandbox
            - live
          type: string
          description: The environment this customer was created in.
        metadata:
          type: object
          propertyNames: {}
          additionalProperties: {}
          description: The metadata for the customer.
        send_email_receipts:
          type: boolean
          description: Whether to send email receipts to the customer.
        billing_controls:
          type: object
          properties:
            auto_topups:
              type: array
              items:
                type: object
                properties:
                  feature_id:
                    type: string
                    description: The ID of the feature (credit balance) to auto top-up.
                  enabled:
                    type: boolean
                    default: false
                    description: Whether auto top-up is enabled.
                  threshold:
                    type: number
                    minimum: 0
                    description: When the balance drops below this threshold, an auto top-up will be
                      purchased.
                  quantity:
                    type: number
                    minimum: 1
                    description: Amount of credits to add per auto top-up.
                  purchase_limit:
                    anyOf:
                      - type: object
                        properties:
                          interval:
                            anyOf:
                              - enum:
                                  - hour
                                  - day
                                  - week
                                  - month
                                type: string
                              - type: "null"
                            description: The time interval for the purchase limit window. Null when no
                              purchase limit is configured.
                          interval_count:
                            anyOf:
                              - type: number
                                minimum: 1
                              - type: "null"
                            description: Number of intervals in the purchase limit window. Null when no
                              purchase limit is configured.
                          limit:
                            anyOf:
                              - type: number
                                minimum: 1
                              - type: "null"
                            description: Maximum number of auto top-ups allowed within the interval. Null
                              when no purchase limit is configured.
                          count:
                            type: number
                            description: Number of auto top-ups already consumed in the current window.
                          next_reset_at:
                            type: number
                            description: Unix ms timestamp when the current purchase window ends and the
                              count resets.
                        required:
                          - interval
                          - interval_count
                          - limit
                          - count
                          - next_reset_at
                      - type: object
                        properties:
                          interval:
                            enum:
                              - hour
                              - day
                              - week
                              - month
                            type: string
                            description: The time interval for the purchase limit window.
                          interval_count:
                            type: number
                            minimum: 1
                            default: 1
                            description: Number of intervals in the purchase limit window.
                          limit:
                            type: number
                            minimum: 1
                            description: Maximum number of auto top-ups allowed within the interval.
                        required:
                          - interval
                          - limit
                    description: Optional rate limit to cap how often auto top-ups occur. Expand
                      billing_controls.auto_topups.purchase_limit for a count of
                      top ups and the next_reset_at.
                  invoice_mode:
                    type: boolean
                    description: When true, auto top-up creates a send_invoice invoice instead of
                      auto-charging.
                  source:
                    enum:
                      - customer
                      - plan
                    type: string
                    description: "Response-only: whether the entry is a customer-level override or
                      inherited from an attached plan's defaults."
                required:
                  - feature_id
                  - threshold
                  - quantity
              description: List of auto top-up configurations per feature.
            spend_limits:
              type: array
              items:
                type: object
                properties:
                  feature_id:
                    type: string
                    description: Optional feature ID this spend limit applies to.
                  enabled:
                    type: boolean
                    default: false
                    description: Whether the overage spend limit is enabled.
                  limit_type:
                    enum:
                      - absolute
                      - usage_percentage
                    type: string
                    description: "How overage_limit is interpreted: an absolute overage cap
                      (default) or a percentage of the main-plan allowance."
                  overage_limit:
                    type: number
                    minimum: 0
                    description: "Overage cap for the feature: absolute units, or a percent (e.g.
                      120) when limit_type is usage_percentage."
                  skip_overage_billing:
                    type: boolean
                    description: When true, overage for this feature is not posted to Stripe. Usage
                      tracking and balance resets still behave normally.
                  source:
                    enum:
                      - customer
                      - plan
                    type: string
                    description: "Response-only: whether the entry is a customer-level override or
                      inherited from an attached plan's defaults."
              description: List of overage spend limits per feature (caps overage spend).
            usage_limits:
              type: array
              items:
                type: object
                properties:
                  feature_id:
                    type: string
                    description: The feature this usage limit applies to.
                  enabled:
                    type: boolean
                    default: true
                    description: Whether this usage limit is enabled.
                  limit:
                    type: number
                    minimum: 0
                    description: Maximum units allowed per interval.
                  interval:
                    enum:
                      - day
                      - week
                      - month
                      - year
                    type: string
                    description: Interval for the cap, aligned to the customer's billing cycle.
                  filter:
                    type: object
                    properties:
                      properties:
                        type: object
                        propertyNames:
                          type: string
                          minLength: 1
                          maxLength: 64
                        additionalProperties: {}
                    required:
                      - properties
                    description: When set, only usage from events whose properties match counts
                      toward this cap. Omit to count all usage of the feature.
                  usage:
                    type: number
                    minimum: 0
                    description: Current usage already consumed in the active interval.
                      Response-only; not stored on billing controls.
                  source:
                    enum:
                      - customer
                      - plan
                    type: string
                    description: "Response-only: whether the entry is a customer-level override or
                      inherited from an attached plan's defaults."
                required:
                  - feature_id
                  - limit
                  - interval
              description: List of hard usage caps per feature, with current interval usage.
            usage_alerts:
              type: array
              items:
                type: object
                properties:
                  feature_id:
                    type: string
                    description: The feature ID this alert applies to.
                  enabled:
                    type: boolean
                    default: true
                    description: Whether this usage alert is enabled.
                  threshold:
                    type: number
                    minimum: 0
                    description: The threshold value that triggers the alert. For usage or
                      remaining, this is an absolute count. For usage_percentage
                      or remaining_percentage, this is a percentage (0-100).
                  threshold_type:
                    enum:
                      - usage
                      - usage_percentage
                      - remaining
                      - remaining_percentage
                    type: string
                    description: Whether the threshold is an absolute count or a percentage of the
                      usage allowance or remaining balance.
                  name:
                    type: string
                    description: Optional user-defined label to distinguish multiple alerts on the
                      same feature.
                  source:
                    enum:
                      - customer
                      - plan
                    type: string
                    description: "Response-only: whether the entry is a customer-level override or
                      inherited from an attached plan's defaults."
                required:
                  - threshold
                  - threshold_type
              description: List of usage alert configurations per feature.
            overage_allowed:
              type: array
              items:
                type: object
                properties:
                  feature_id:
                    type: string
                    description: The feature ID this overage allowed control applies to.
                  enabled:
                    type: boolean
                    default: false
                    description: Whether overage is allowed for this feature.
                  source:
                    enum:
                      - customer
                      - plan
                    type: string
                    description: "Response-only: whether the entry is a customer-level override or
                      inherited from an attached plan's defaults."
                required:
                  - feature_id
              description: List of overage allowed controls per feature. When enabled, usage
                can exceed balance.
          description: Billing controls for the customer (auto top-ups, etc.)
        subscriptions:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                description: The unique identifier of this subscription. If a subscription_id
                  was provided at attach time, it is used; otherwise, falls back
                  to the internal ID.
              plan:
                $ref: "#/components/schemas/Plan"
                description: The full plan object if expanded.
              plan_id:
                type: string
                description: The unique identifier of the subscribed plan.
              auto_enable:
                type: boolean
                description: Whether the plan was automatically enabled for the customer.
              add_on:
                type: boolean
                description: Whether this is an add-on plan rather than a base subscription.
              status:
                enum:
                  - active
                  - scheduled
                type: string
                description: Current status of the subscription.
              past_due:
                type: boolean
                description: Whether the subscription has overdue payments.
              canceled_at:
                anyOf:
                  - type: number
                  - type: "null"
                description: Timestamp when the subscription was canceled, or null if not
                  canceled.
              expires_at:
                anyOf:
                  - type: number
                  - type: "null"
                description: Timestamp when the subscription will expire, or null if no expiry
                  set.
              trial_ends_at:
                anyOf:
                  - type: number
                  - type: "null"
                description: Timestamp when the trial period ends, or null if not on trial.
              started_at:
                type: number
                description: Timestamp when the subscription started.
              current_period_start:
                anyOf:
                  - type: number
                  - type: "null"
                description: Start timestamp of the current billing period.
              current_period_end:
                anyOf:
                  - type: number
                  - type: "null"
                description: End timestamp of the current billing period.
              quantity:
                type: number
                description: Number of units of this subscription (for per-seat plans).
              scope:
                enum:
                  - customer
                  - entity
                type: string
                description: Whether this subscription is attached at the customer level or
                  entity level.
            required:
              - id
              - plan_id
              - auto_enable
              - add_on
              - status
              - past_due
              - canceled_at
              - expires_at
              - trial_ends_at
              - started_at
              - current_period_start
              - current_period_end
              - quantity
          description: Active and scheduled recurring plans that this customer has attached.
        purchases:
          type: array
          items:
            type: object
            properties:
              plan:
                $ref: "#/components/schemas/Plan"
                description: The full plan object if expanded.
              plan_id:
                type: string
                description: The unique identifier of the purchased plan.
              expires_at:
                anyOf:
                  - type: number
                  - type: "null"
                description: Timestamp when the purchase expires, or null for lifetime access.
              started_at:
                type: number
                description: Timestamp when the purchase was made.
              quantity:
                type: number
                description: Number of units purchased.
              scope:
                enum:
                  - customer
                  - entity
                type: string
                description: Whether this purchase is attached at the customer level or entity
                  level.
            required:
              - plan_id
              - expires_at
              - started_at
              - quantity
          description: One-time purchases made by the customer.
        balances:
          type: object
          propertyNames:
            type: string
          additionalProperties:
            $ref: "#/components/schemas/Balance"
          description: Feature balances keyed by feature ID, showing usage limits and
            remaining amounts.
        flags:
          type: object
          propertyNames:
            type: string
          additionalProperties:
            type: object
            properties:
              id:
                type: string
                description: The unique identifier for this flag.
              plan_id:
                anyOf:
                  - type: string
                  - type: "null"
                description: The plan ID this flag originates from, or null for standalone
                  flags.
              expires_at:
                anyOf:
                  - type: number
                  - type: "null"
                description: Timestamp when this flag expires, or null for no expiration.
              feature_id:
                type: string
                description: The feature ID this flag is for.
              feature:
                type: object
                properties:
                  id:
                    type: string
                    description: The unique identifier for this feature, used in /check and /track
                      calls.
                  name:
                    type: string
                    description: Human-readable name displayed in the dashboard and billing UI.
                  type:
                    enum:
                      - boolean
                      - metered
                      - credit_system
                      - ai_credit_system
                    type: string
                    description: "Feature type: 'boolean' for on/off access, 'metered' for
                      usage-tracked features, 'credit_system' for unified credit
                      pools, 'ai_credit_system' for model-based token pricing."
                  consumable:
                    type: boolean
                    description: "For metered features: true if usage resets periodically (API
                      calls, credits), false if allocated persistently (seats,
                      storage)."
                  event_names:
                    type: array
                    items:
                      type: string
                    description: Event names that trigger this feature's balance. Allows multiple
                      features to respond to a single event.
                  credit_schema:
                    type: array
                    items:
                      type: object
                      properties:
                        metered_feature_id:
                          type: string
                          description: ID of the metered feature that draws from this credit system.
                        credit_cost:
                          type: number
                          description: Credits consumed per unit of the metered feature.
                      required:
                        - metered_feature_id
                        - credit_cost
                    description: "For credit_system features: maps metered features to their credit
                      costs."
                  model_markups:
                    anyOf:
                      - type: object
                        propertyNames:
                          type: string
                        additionalProperties:
                          type: object
                          properties:
                            markup:
                              type: number
                              minimum: -100
                            input_cost:
                              type: number
                              minimum: 0
                            output_cost:
                              type: number
                              minimum: 0
                      - type: "null"
                    description: Per-model markup overrides for AI credit systems.
                  default_markup:
                    type: number
                    minimum: -100
                    description: Default percentage markup for AI credit systems. Use -100 to make
                      usage free.
                  provider_markups:
                    anyOf:
                      - type: object
                        propertyNames:
                          type: string
                        additionalProperties:
                          type: object
                          properties:
                            markup:
                              type: number
                              minimum: -100
                          required:
                            - markup
                      - type: "null"
                    description: Per-provider default markup percentages for AI credit systems.
                  display:
                    type: object
                    properties:
                      singular:
                        anyOf:
                          - type: string
                          - type: "null"
                        description: Singular form for UI display (e.g., 'API call', 'seat').
                      plural:
                        anyOf:
                          - type: string
                          - type: "null"
                        description: Plural form for UI display (e.g., 'API calls', 'seats').
                    description: Display names for the feature in billing UI and customer-facing
                      components.
                  archived:
                    type: boolean
                    description: Whether the feature is archived and hidden from the dashboard.
                required:
                  - id
                  - name
                  - type
                  - consumable
                  - archived
                description: The full feature object if expanded.
            required:
              - id
              - plan_id
              - expires_at
              - feature_id
            examples:
              - id: cus_ent_39qmLooixXLAqMywgXywjAz96rV
                plan_id: pro_plan
                expires_at: null
                feature_id: dashboard
          description: Boolean feature flags keyed by feature ID, showing enabled access
            for on/off features.
        config:
          type: object
          properties:
            disable_pooled_balance:
              type: boolean
              description: Whether to disable the shared customer-level pool for entities.
            disable_overage_billing:
              type: boolean
              description: Stops Autumn from posting usage-overage line items to Stripe for
                this customer. Check/track and balance resets still behave
                normally. When set, this overrides the organization-level
                disable_overage_billing setting.
          description: Configuration for the customer.
        processors:
          type: object
          properties:
            stripe:
              type: object
              properties:
                id:
                  type: string
                  description: Stripe customer ID.
              required:
                - id
              description: Stripe processor connection for the customer.
            vercel:
              type: object
              properties:
                installation_id:
                  type: string
                  description: Vercel marketplace installation ID for this customer.
                account_id:
                  type: string
                  description: Vercel account ID associated with the installation.
              required:
                - installation_id
                - account_id
              description: Vercel processor connection for the customer (public-safe subset).
            revenuecat:
              type: object
              properties:
                id:
                  anyOf:
                    - type: string
                    - type: "null"
                  description: Customer's external ID, used as the RevenueCat app user ID. Null if
                    the customer has no external ID set.
              required:
                - id
              description: RevenueCat processor connection for the customer.
          description: Payment processors this customer is connected to (Stripe, Vercel,
            RevenueCat). Omitted entirely when the customer has not been created
            in any processor.
        invoices:
          type: array
          items:
            type: object
            properties:
              plan_ids:
                type: array
                items:
                  type: string
                description: Array of plan IDs included in this invoice
              stripe_id:
                type: string
                description: The Stripe invoice ID
              processor_type:
                enum:
                  - stripe
                  - revenuecat
                type: string
                default: stripe
                description: The billing processor that owns this invoice.
              status:
                type: string
                description: The status of the invoice
              total:
                type: number
                description: The total amount of the invoice
              currency:
                type: string
                description: The currency code for the invoice
              created_at:
                type: number
                description: Timestamp when the invoice was created
              hosted_invoice_url:
                anyOf:
                  - type: string
                  - type: "null"
                description: URL to the Stripe-hosted invoice page
            required:
              - plan_ids
              - stripe_id
              - status
              - total
              - currency
              - created_at
          description: Invoices for this customer.
        entities:
          type: array
          items:
            type: object
            properties:
              id:
                anyOf:
                  - type: string
                  - type: "null"
                description: The unique identifier of the entity
              name:
                anyOf:
                  - type: string
                  - type: "null"
                description: The name of the entity
              customer_id:
                anyOf:
                  - type: string
                  - type: "null"
                description: The customer ID this entity belongs to
              feature_id:
                anyOf:
                  - type: string
                  - type: "null"
