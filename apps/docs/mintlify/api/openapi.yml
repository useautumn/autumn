            created. Used for free plans.
        price:
          anyOf:
            - type: object
              properties:
                amount:
                  type: number
                  description: Base price amount for the plan.
                additional_currencies:
                  type: array
                  items:
                    type: object
                    properties:
                      currency:
                        type: string
                        description: Three-letter Stripe-supported currency code (e.g. 'eur', 'gbp').
                      amount:
                        type: number
                        description: Price amount in this currency. Set explicitly per currency, not
                          converted from the base amount.
                    required:
                      - currency
                      - amount
                  description: Base price amounts in additional currencies. The base 'amount' is
                    in the org's default currency.
                interval:
                  enum:
                    - one_off
                    - week
                    - month
                    - quarter
                    - semi_annual
                    - year
                  type: string
                  description: Billing interval (e.g. 'month', 'year').
                interval_count:
                  type: number
                  description: Number of intervals per billing cycle. Defaults to 1.
                display:
                  type: object
                  properties:
                    primary_text:
                      type: string
                      description: Main display text (e.g. '$10' or '100 messages').
                    secondary_text:
                      type: string
                      description: Secondary display text (e.g. 'per month' or 'then $0.5 per 100').
                  required:
                    - primary_text
                  description: Display text for showing this price in pricing pages.
              required:
                - amount
                - interval
            - type: "null"
          description: Base recurring price for the plan. Null for free plans or
            usage-only plans.
        items:
          type: array
