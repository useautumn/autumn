  /v1/plans.list:
    post:
      operationId: listPlans
      summary: List all plans
      description: >-
        Lists all plans in the current environment.


        Use this to retrieve all plans for displaying pricing pages or managing
        plan configurations.
      tags:
        - plans
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                customer_id:
                  type: string
                  description: Customer ID to include eligibility info (trial availability, attach
                    scenario).
                entity_id:
                  type: string
                  description: Entity ID for entity-scoped plans.
                include_archived:
                  type: boolean
                  description: If true, includes archived plans in the response.
                all_versions:
                  type: boolean
                  description: If true, includes all plan versions.
              title: ListPlansParams
              examples:
                - &a15 {}
                - customer_id: cus_123
                - include_archived: true
            example: *a15
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  list:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Unique identifier for the plan.
                        name:
                          type: string
                          description: Display name of the plan.
                        description:
                          anyOf:
                            - type: string
                            - type: "null"
                          description: Optional description of the plan.
                        group:
                          anyOf:
                            - type: string
                            - type: "null"
                          description: Group identifier for organizing related plans. Plans in the same
                            group are mutually exclusive.
                        version:
                          type: number
                          description: Version number of the plan. Incremented when plan configuration
                            changes.
                        add_on:
                          type: boolean
                          description: Whether this is an add-on plan that can be attached alongside a
                            main plan.
                        auto_enable:
                          type: boolean
                          description: If true, this plan is automatically attached when a customer is
                            created. Used for free plans.
                        price:
                          anyOf:
                            - type: object
                              properties:
                                amount:
                                  type: number
                                  description: Base price amount for the plan.
                                additional_currencies:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      currency:
                                        type: string
                                        description: Three-letter Stripe-supported currency code (e.g. 'eur', 'gbp').
                                      amount:
                                        type: number
                                        description: Price amount in this currency. Set explicitly per currency, not
                                          converted from the base amount.
                                    required:
                                      - currency
                                      - amount
                                  description: Base price amounts in additional currencies. The base 'amount' is
                                    in the org's default currency.
                                interval:
                                  enum:
                                    - one_off
                                    - week
                                    - month
                                    - quarter
                                    - semi_annual
                                    - year
                                  type: string
                                  description: Billing interval (e.g. 'month', 'year').
                                interval_count:
                                  type: number
                                  description: Number of intervals per billing cycle. Defaults to 1.
                                display:
                                  type: object
                                  properties:
                                    primary_text:
                                      type: string
                                      description: Main display text (e.g. '$10' or '100 messages').
                                    secondary_text:
                                      type: string
                                      description: Secondary display text (e.g. 'per month' or 'then $0.5 per 100').
                                  required:
                                    - primary_text
                                  description: Display text for showing this price in pricing pages.
                              required:
                                - amount
                                - interval
                            - type: "null"
                          description: Base recurring price for the plan. Null for free plans or
                            usage-only plans.
                        items:
                          type: array
                          items:
                            type: object
                            properties:
                              feature_id:
                                type: string
                                description: The ID of the feature this item configures.
                              feature:
                                type: object
                                properties:
                                  id:
                                    type: string
                                    description: The ID of the feature, used to refer to it in other API calls like
                                      /track or /check.
                                  name:
                                    anyOf:
                                      - type: string
                                      - type: "null"
                                    description: The name of the feature.
                                  type:
                                    enum:
                                      - static
                                      - boolean
                                      - single_use
                                      - continuous_use
                                      - credit_system
                                      - ai_credit_system
                                    type: string
                                    description: The type of the feature
                                  display:
                                    anyOf:
                                      - type: object
                                        properties:
                                          singular:
                                            type: string
                                            description: The singular display name for the feature.
                                          plural:
                                            type: string
                                            description: The plural display name for the feature.
                                        required:
                                          - singular
                                          - plural
                                      - type: "null"
                                    description: Singular and plural display names for the feature.
                                  credit_schema:
                                    anyOf:
                                      - type: array
                                        items:
                                          type: object
                                          properties:
                                            metered_feature_id:
                                              type: string
                                              description: The ID of the metered feature (should be a single_use feature).
                                            credit_cost:
                                              type: number
                                              description: The credit cost of the metered feature.
                                          required:
                                            - metered_feature_id
                                            - credit_cost
                                      - type: "null"
                                    description: Credit cost schema for credit system features.
                                  archived:
                                    anyOf:
                                      - type: boolean
                                      - type: "null"
                                    description: Whether or not the feature is archived.
                                required:
                                  - id
                                  - type
