                  anyOf:
                    - type: string
                    - type: "null"
                  description: Stripe customer ID if you already have one
                send_email_receipts:
                  type: boolean
                  description: Whether to send email receipts to this customer
                currency:
                  anyOf:
                    - type: string
                    - type: "null"
                  description: Currency to bill this customer in (e.g. usd, eur). Defaults to the
                    organization's default currency.
                billing_controls:
                  type: object
                  properties:
                    auto_topups:
                      type: array
                      items:
                        type: object
