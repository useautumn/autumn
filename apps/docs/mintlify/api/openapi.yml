  /v1/keys.mint:
    post:
      operationId: mintKey
      description: Mints a per-customer token (a scoped `am_jwt_` credential) so a
        downstream / self-hosted app can call Autumn directly without your
        secret key. Returns a short-lived access token plus a rotating refresh
        token, both bound to the given customer. Authenticated with your secret
        key.
      tags:
        - keys
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customer_id:
                  type: string
                  description: The customer to mint a token for.
                indefinite:
                  type: boolean
                  description: If true, mint a non-expiring access token (no refresh token).
                    Revoke via keys.revoke.
              required:
                - customer_id
              title: MintKeyParams
              examples:
                - &a96
                  customer_id: cus_123
            example: *a96
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    description: Access token (1h, or non-expiring if indefinite), prefixed
                      `am_jwt_`.
                  refresh_token:
                    type: string
                    description: Rotating refresh token (24h). Omitted for indefinite tokens.
                  expires_at:
                    anyOf:
                      - type: number
                      - type: "null"
                    description: Access-token expiry, ms since epoch. null for indefinite tokens.
                  refresh_expires_at:
                    type: number
                    description: Refresh-token expiry, ms since epoch. Omitted for indefinite
                      tokens.
                required:
                  - access_token
                  - expires_at
                examples:
                  - &a97
                    access_token: am_jwt_eyJhbGciOiJIUzI1NiJ9...
                    refresh_token: am_jwt_eyJhbGciOiJIUzI1NiJ9...
                    expires_at: 1781113864000
                    refresh_expires_at: 1781196664000
              example: *a97
      x-speakeasy-name-override: mint
      parameters:
        - *a5
      x-codeSamples:
        - lang: typescript
          label: Typescript (SDK)
          source: |-
