                            description: Whether the overage spend limit is enabled.
                          limit_type:
                            enum:
                              - absolute
                              - usage_percentage
                            type: string
                            description: "How overage_limit is interpreted: an absolute overage cap
                              (default) or a percentage of the main-plan
                              allowance."
                          overage_limit:
                            type: number
                            minimum: 0
                            description: "Overage cap for the feature: absolute units, or a percent (e.g.
                              120) when limit_type is usage_percentage."
                          skip_overage_billing:
                            type: boolean
                            description: When true, overage for this feature is not posted to Stripe. Usage
                              tracking and balance resets still behave normally.
                      description: List of overage spend limits per feature (caps overage spend).
                    usage_limits:
                      type: array
                      items:
                        type: object
                        properties:
                          feature_id:
                            type: string
                            description: The feature this usage limit applies to.
                          enabled:
                            type: boolean
                            default: true
                            description: Whether this usage limit is enabled.
                          limit:
                            type: number
                            minimum: 0
                            description: Maximum units allowed per interval.
                          interval:
                            enum:
                              - day
                              - week
                              - month
                              - year
                            type: string
                            description: Interval for the cap, aligned to the customer's billing cycle.
