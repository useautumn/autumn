      description: Exchanges a refresh token (sent as the Bearer credential) for a
        freshly rotated access + refresh pair. Self-service for the token holder
        — no secret key required. The previous refresh token is honored for one
        rotation as a grace window; replaying an older one revokes the
        customer's tokens.
