                      main plan.
                  auto_enable:
                    type: boolean
                    description: If true, this plan is automatically attached when a customer is
                      created. Used for free plans.
                  price:
                    anyOf:
                      - type: object
                        properties:
                          amount:
                            type: number
                            description: Base price amount for the plan.
                          additional_currencies:
                            type: array
                            items:
                              type: object
