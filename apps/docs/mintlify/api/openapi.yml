                    - cancel_end_of_cycle
                    - uncancel
                  type: string
                  description: Action to perform for cancellation. 'cancel_immediately' cancels
                    now with prorated refund, 'cancel_end_of_cycle' cancels at
                    period end, 'uncancel' reverses a pending cancellation.
