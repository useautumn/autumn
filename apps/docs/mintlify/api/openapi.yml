  /v1/balances.create:
    post:
      operationId: createBalance
      description: Create a balance for a customer feature.
      tags:
        - balances
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customer_id:
                  type: string
                  description: The ID of the customer.
                feature_id:
                  type: string
                  description: The ID of the feature.
                entity_id:
                  type: string
                  description: The ID of the entity for entity-scoped balances (e.g., per-seat
                    limits).
                included_grant:
                  type: number
                  description: The initial balance amount to grant. For metered features, this is
                    the number of units the customer can use.
                unlimited:
                  type: boolean
                  description: If true, the balance has unlimited usage. Cannot be combined with
                    'included_grant'.
                reset:
                  type: object
                  properties:
                    interval:
                      enum:
                        - one_off
                        - minute
                        - hour
                        - day
                        - week
                        - month
                        - quarter
                        - semi_annual
                        - year
                      type: string
                      description: The interval at which the balance resets (e.g., 'month', 'day',
                        'year').
                    interval_count:
                      type: number
                      description: "Number of intervals between resets. Defaults to 1 (e.g.,
                        interval_count: 2 with interval: 'month' resets every 2
                        months)."
                  required:
                    - interval
                  description: Reset configuration for the balance. If not provided, the balance
                    is a one-time grant that never resets.
                rollover:
                  type: object
                  properties:
                    max:
                      anyOf:
                        - type: number
                        - type: "null"
                    max_percentage:
                      anyOf:
                        - type: number
                        - type: "null"
                    duration:
                      enum:
                        - month
                        - forever
                      type: string
                      default: month
                    length:
                      type: number
                  required:
                    - length
                  description: Rollover configuration for the balance.
                expires_at:
                  type: number
                  description: Unix timestamp (milliseconds) when the balance expires. Mutually
                    exclusive with reset.
                next_reset_at:
                  type: number
                  description: Unix timestamp (milliseconds) for the first reset boundary,
                    allowing a custom (e.g. shorter) first period. Requires
                    'reset', and must occur before 'expires_at' if both are
                    provided. Subsequent resets advance by one reset interval
                    from this boundary.
                balance_id:
                  type: string
                  description: A unique identifier for this balance. Use this to target the
                    balance in future update / delete calls.
              required:
                - customer_id
                - feature_id
              title: CreateBalanceParams
              examples:
                - &a53
                  customer_id: cus_123
                  feature_id: api_calls
                  included: 1000
                  reset:
                    interval: month
            example: *a53
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required:
                  - success
      x-speakeasy-name-override: create
      parameters:
        - *a5
      x-codeSamples:
        - lang: typescript
          label: Typescript (SDK)
          source: |-
            import { Autumn } from 'autumn-js'

            const autumn = new Autumn()

            const result = await autumn.balances.create({
              customerId: "cus_123",
              featureId: "api_calls",
              reset: {
                interval: "month",
              },
            });
        - lang: python
          label: Python (SDK)
          source: |-
            from autumn_sdk import Autumn

            autumn = Autumn(secret_key="am_sk_test...")

            res = autumn.balances.create(
                customer_id="cus_123",
                feature_id="api_calls",
                reset={
                    "interval": "month",
                },
            )
