                  action: confirm
                  override_value: 3
                - lock_id: lock_abc123
                  action: release
            example: *a56
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required:
                  - success
