      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  list:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Event ID (KSUID)
                        timestamp:
                          type: number
                          description: Event timestamp (epoch milliseconds)
                        feature_id:
                          type: string
                          description: ID of the feature that the event belongs to
                        customer_id:
                          type: string
                          description: Customer identifier
                        value:
                          type: number
                          description: Event value/count
                        properties:
                          type: object
                          propertyNames:
                            type: string
                          additionalProperties: {}
                          description: Event properties (JSON)
                        deductions:
                          anyOf:
                            - type: array
                              items:
                                type: object
                                properties:
                                  balance_id:
                                    type: string
                                    description: ID of the underlying balance row that was deducted from
                                      (customer_entitlement or rollover).
                                  feature_id:
                                    type: string
                                    description: The feature this balance belongs to.
                                  plan_id:
                                    anyOf:
                                      - type: string
                                      - type: "null"
                                    description: ID of the plan/product this balance belongs to. Null when the
                                      balance can't be attributed to a single
                                      plan (e.g. it spans multiple).
                                  reset:
                                    anyOf:
                                      - type: object
                                        properties:
                                          interval:
                                            anyOf:
                                              - enum:
                                                  - one_off
                                                  - minute
                                                  - hour
                                                  - day
                                                  - week
                                                  - month
                                                  - quarter
                                                  - semi_annual
                                                  - year
                                                type: string
                                              - const: multiple
                                            description: The reset interval (hour, day, week, month, etc.) or 'multiple' if
                                              combined from different intervals.
                                          interval_count:
                                            type: number
                                            description: Number of intervals between resets (eg. 2 for bi-monthly).
                                          resets_at:
                                            anyOf:
                                              - type: number
                                              - type: "null"
                                            description: Timestamp when the balance will next reset.
                                        required:
                                          - interval
                                          - resets_at
                                      - type: "null"
                                    description: Reset configuration for the balance this deduction came from, or
                                      null if the balance doesn't reset.
                                  value:
                                    type: number
                                    description: Amount deducted from this balance. Positive when usage was
                                      consumed, negative when credit was
                                      restored (e.g. a refund via negative track
                                      value).
                                required:
                                  - balance_id
                                  - feature_id
                                  - plan_id
                                  - reset
                                  - value
                            - type: "null"
                          description: Per-balance breakdown of what this event deducted. Null for events
                            ingested before deductions were tracked; an empty
                            array means the event was accepted but no balance
                            moved.
                      required:
                        - id
                        - timestamp
                        - feature_id
                        - customer_id
                        - value
                        - properties
                        - deductions
                    description: Items for current page.
                  next_cursor:
                    anyOf:
                      - type: string
                      - type: "null"
                    description: Opaque cursor for the next page. Null when there are no more
                      results.
                required:
                  - list
                  - next_cursor
                examples:
                  - &a69
                    list:
                      - id: evt_36xpk2TmuQX5zVPPQ8tCtnR5Weg
                        timestamp: 1765958215459
                        feature_id: credits
                        customer_id: 0pCIbS4AMAFDB1iBMNhARWZt2gDtVwQx
                        value: 30
                        properties: {}
                        deductions:
                          - balance_id: cus_ent_3DdSDtFBlvDbjyUuJeUIbQlyN12
                            feature_id: credits
                            plan_id: pro
                            reset:
                              interval: month
                              resets_at: 1765958215459
                            value: 30
                      - id: evt_36xmHxxjAkqxufDf9yHAPNfRrLM
                        timestamp: 1765956512057
                        feature_id: credits
                        customer_id: 0pCIbS4AMAFDB1iBMNhARWZt2gDtVwQx
                        value: 49
                        properties: {}
                        deductions: null
                    next_cursor: eyJ2IjowLCJpZCI6ImV2dF8zNnhtSHh4akFrcXh1ZkRmOXlIQVBOZlJyTE0iLCJ0IjoxNzY1OTU2NTEyMDU3fQ
              example: *a69
      x-speakeasy-name-override: list
      parameters:
        - *a5
      x-codeSamples:
        - lang: typescript
          label: Typescript (SDK)
          source: |-
            import { Autumn } from 'autumn-js'

            const autumn = new Autumn()

            const result = await autumn.events.list({
              customerId: "cus_123",
            });
        - lang: python
          label: Python (SDK)
          source: |-
            from autumn_sdk import Autumn

            autumn = Autumn(secret_key="am_sk_test...")

            res = autumn.events.list(
                start_cursor="",
                limit=50,
                customer_id="cus_123",
            )
  /v1/events.aggregate:
    post:
      operationId: aggregateEvents
      description: Aggregate usage events by time period. Returns usage totals grouped
        by feature and optionally by a custom property.
      tags:
        - events
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customer_id:
                  type: string
                  minLength: 1
                  description: Customer ID to aggregate events for
                entity_id:
                  type: string
                  minLength: 1
                  description: Entity ID to filter aggregated events for (e.g., per-seat or
                    per-resource limits)
                feature_id:
                  anyOf:
                    - type: string
                      minLength: 1
                    - type: array
                      items:
                        type: string
                        minLength: 1
                  description: Feature ID(s) to aggregate events for
                group_by:
                  type: string
                  description: Property to group events by (e.g. "properties.region"), or
                    "$customer_id" / "$entity_id" / "$plan_id" to group by those
                    columns
                range:
                  enum:
                    - 24h
                    - 7d
                    - 30d
                    - 90d
                    - last_cycle
                    - 1bc
                    - 3bc
                  type: string
                  description: Time range to aggregate events for. Either range or custom_range
                    must be provided
                bin_size:
                  enum:
                    - day
                    - hour
                    - week
                    - month
                  type: string
                  default: day
                  description: Size of the time bins to aggregate events for. Defaults to hour if
                    range is 24h, otherwise day
                custom_range:
                  type: object
                  properties:
                    start:
                      type: number
                    end:
                      type: number
                  required:
                    - start
                    - end
                  description: Custom time range to aggregate events for. If provided, range must
                    not be provided
                filter_by:
                  type: object
                  propertyNames:
                    type: string
                  additionalProperties:
                    type: string
                  description: 'Filter events by property values, e.g. {"model": "gpt-4",
                    "region": "us"}. Maximum 5 filters.'
                max_groups:
                  type: integer
                  minimum: 1
                  maximum: 250
                  description: Maximum number of distinct group values to return per time bin when
                    using group_by. Remaining values are bundled into an 'Other'
                    bucket. Defaults to 9
              required:
                - feature_id
              title: EventsAggregateParams
              examples:
                - &a70
                  customer_id: cus_123
                  feature_id: api_calls
                  range: 30d
                  bin_size: day
                - customer_id: cus_123
                  feature_id:
                    - api_calls
                    - messages
                  range: 7d
                  group_by: properties.model
            example: *a70
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  list:
                    type: array
                    items:
                      type: object
                      properties:
                        period:
                          type: number
                          description: Unix timestamp (epoch ms) for this time period
                        values:
                          type: object
                          propertyNames:
                            type: string
                          additionalProperties:
                            type: number
                          description: "Aggregated values per feature: { [featureId]: number }"
                        grouped_values:
                          type: object
                          propertyNames:
                            type: string
                          additionalProperties:
                            type: object
                            propertyNames:
                              type: string
                            additionalProperties:
                              type: number
                          description: "Values broken down by group (only present when group_by is used):
                            { [featureId]: { [groupValue]: number } }"
                      required:
                        - period
                        - values
                    description: Array of time periods with aggregated values
                  total:
                    type: object
                    propertyNames:
                      type: string
                    additionalProperties:
                      type: object
                      properties:
                        count:
                          type: number
                          description: Number of events for this feature
                        sum:
                          type: number
                          description: Sum of event values for this feature
                      required:
                        - count
                        - sum
                    description: Total aggregations per feature. Keys are feature IDs, values
                      contain count and sum.
                required:
                  - list
                  - total
                examples:
                  - &a71
                    list:
                      - period: 1762905600000
                        values:
                          messages: 10
                          sessions: 3
                      - period: 1762992000000
                        values:
                          messages: 3
                          sessions: 12
                    total:
                      messages:
                        count: 2
                        sum: 13
                      sessions:
                        count: 2
                        sum: 15
                  - list:
                      - period: 1762905600000
                        values:
                          messages: 10
                          sessions: 3
                        grouped_values:
                          messages:
                            api: 5
                            web: 5
                          sessions:
                            api: 2
                            web: 1
                      - period: 1762992000000
                        values:
                          messages: 3
                          sessions: 12
                        grouped_values:
                          messages:
                            api: 1
                            web: 2
                          sessions:
                            api: 10
                            web: 2
                    total:
                      messages:
                        count: 2
                        sum: 13
                      sessions:
                        count: 2
                        sum: 15
              example: *a71
      x-speakeasy-name-override: aggregate
      parameters:
        - *a5
      x-codeSamples:
        - lang: typescript
          label: Typescript (SDK)
          source: |-
            import { Autumn } from 'autumn-js'

            const autumn = new Autumn()

            const result = await autumn.events.aggregate({
              customerId: "cus_123",
              featureId: "api_calls",
              range: "30d",
            });
        - lang: python
          label: Python (SDK)
          source: |-
            from autumn_sdk import Autumn

            autumn = Autumn(secret_key="am_sk_test...")

            res = autumn.events.aggregate(
                feature_id="api_calls",
                customer_id="cus_123",
                range="30d",
                bin_size="day",
            )
  /v1/entities.create:
    post:
      operationId: createEntity
      description: >-
        Creates an entity for a customer and feature, then returns the entity
        with balances and subscriptions.


        Use entities when usage and access must be scoped to sub-resources (for
        example seats, projects, or workspaces) instead of only the customer.
      tags:
        - entities
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  anyOf:
                    - type: string
                    - type: "null"
                  description: The name of the entity
                feature_id:
                  type: string
                  description: The ID of the feature this entity is associated with
                billing_controls:
                  type: object
                  properties:
                    spend_limits:
                      type: array
                      items:
                        type: object
                        properties:
                          feature_id:
                            type: string
                            description: Optional feature ID this spend limit applies to.
                          enabled:
                            type: boolean
                            default: false
                            description: Whether the overage spend limit is enabled.
                          limit_type:
                            enum:
                              - absolute
                              - usage_percentage
                            type: string
                            description: "How overage_limit is interpreted: an absolute overage cap
                              (default) or a percentage of the main-plan
                              allowance."
                          overage_limit:
                            type: number
                            minimum: 0
                            description: "Overage cap for the feature: absolute units, or a percent (e.g.
                              120) when limit_type is usage_percentage."
                          skip_overage_billing:
                            type: boolean
                            description: When true, overage for this feature is not posted to Stripe. Usage
                              tracking and balance resets still behave normally.
                      description: List of spend limits per feature. Each entry caps overage
                        (overage_limit) and/or per-interval usage (usage_limit).
                    usage_limits:
                      type: array
                      items:
                        type: object
                        properties:
                          feature_id:
                            type: string
                            description: The feature this usage limit applies to.
                          enabled:
                            type: boolean
                            default: true
                            description: Whether this usage limit is enabled.
                          limit:
                            type: number
                            minimum: 0
                            description: Maximum units allowed per interval.
                          interval:
                            enum:
                              - day
                              - week
                              - month
                              - year
                            type: string
                            description: Interval for the cap, aligned to the customer's billing cycle.
                          filter:
                            type: object
                            properties:
                              properties:
                                type: object
                                propertyNames:
                                  type: string
                                  minLength: 1
                                  maxLength: 64
                                additionalProperties:
                                  anyOf:
                                    - type: string
                                      minLength: 1
                                      maxLength: 128
                                    - type: number
                                    - type: boolean
                            required:
                              - properties
                            description: When set, only usage from events whose properties match counts
                              toward this cap. Omit to count all usage of the
                              feature.
                        required:
                          - feature_id
                          - limit
                          - interval
                      description: List of hard usage caps per feature for this entity. An entity
                        entry overrides the customer's for that feature.
                    usage_alerts:
                      type: array
                      items:
                        type: object
                        properties:
                          feature_id:
                            type: string
                            description: The feature ID this alert applies to.
                          enabled:
                            type: boolean
                            default: true
                            description: Whether this usage alert is enabled.
                          threshold:
                            type: number
                            minimum: 0
                            description: The threshold value that triggers the alert. For usage or
                              remaining, this is an absolute count. For
                              usage_percentage or remaining_percentage, this is
                              a percentage (0-100).
                          threshold_type:
                            enum:
                              - usage
                              - usage_percentage
                              - remaining
                              - remaining_percentage
                            type: string
                            description: Whether the threshold is an absolute count or a percentage of the
                              usage allowance or remaining balance.
                          name:
                            type: string
                            description: Optional user-defined label to distinguish multiple alerts on the
                              same feature.
                        required:
                          - threshold
                          - threshold_type
                      description: List of usage alert configurations per feature.
                    overage_allowed:
                      type: array
                      items:
                        type: object
                        properties:
                          feature_id:
                            type: string
                            description: The feature ID this overage allowed control applies to.
                          enabled:
                            type: boolean
                            default: false
                            description: Whether overage is allowed for this feature.
                        required:
                          - feature_id
                      description: List of overage allowed controls per feature. When enabled, usage
                        can exceed balance.
                  description: Billing controls for the entity.
                customer_data:
                  $ref: "#/components/schemas/CustomerData"
                  description: Customer attributes used to resolve the customer when customer_id
                    is not provided.
                customer_id:
                  type: string
                  description: The ID of the customer to create the entity for.
                entity_id:
                  type: string
                  description: The ID of the entity.
              required:
                - feature_id
                - customer_id
                - entity_id
              title: CreateEntityParams
              examples:
                - &a72
                  customer_id: cus_123
                  entity_id: seat_42
                  feature_id: seats
                  name: Seat 42
            example: *a72
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    anyOf:
                      - type: string
                      - type: "null"
                    description: The unique identifier of the entity
                  name:
                    anyOf:
                      - type: string
                      - type: "null"
