        - keys
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              title: RefreshKeyParams
              description: No body. The refresh token is supplied as the Bearer credential;
                the response is a freshly rotated access + refresh pair.
              examples:
                - &a98 {}
            example: *a98
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    description: Access token (1h, or non-expiring if indefinite), prefixed
                      `am_jwt_`.
                  refresh_token:
                    type: string
                    description: Rotating refresh token (24h). Omitted for indefinite tokens.
                  expires_at:
                    anyOf:
                      - type: number
                      - type: "null"
                    description: Access-token expiry, ms since epoch. null for indefinite tokens.
                  refresh_expires_at:
                    type: number
                    description: Refresh-token expiry, ms since epoch. Omitted for indefinite
                      tokens.
                required:
                  - access_token
                  - expires_at
                examples:
                  - &a99
