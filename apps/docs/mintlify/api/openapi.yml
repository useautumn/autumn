  /v1/billing.preview_multi_attach:
    post:
      operationId: previewMultiAttach
      description: >-
        Previews the billing changes that would occur when attaching multiple
        plans, without actually making any changes.


        Use this endpoint to show customers what they will be charged before
        confirming a multi-plan subscription.
      tags:
        - billing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customer_id:
                  type: string
                  description: The ID of the customer to attach the plans to.
                entity_id:
                  type: string
                  description: The ID of the entity to attach the plans to.
                plans:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    properties:
                      plan_id:
                        type: string
                        description: The ID of the plan to attach.
                      customize:
                        type: object
                        properties:
                          price:
                            anyOf:
                              - type: object
                                properties:
                                  amount:
                                    type: number
                                    description: Base price amount for the plan.
                                  interval:
                                    enum:
                                      - one_off
                                      - week
                                      - month
                                      - quarter
                                      - semi_annual
                                      - year
                                    type: string
                                    description: Billing interval (e.g. 'month', 'year').
                                  interval_count:
                                    type: number
                                    description: Number of intervals per billing cycle. Defaults to 1.
                                  additional_currencies:
                                    type: array
                                    items:
                                      type: object
                                      properties:
                                        currency:
                                          type: string
                                          description: Three-letter Stripe-supported currency code (e.g. 'eur', 'gbp').
                                        amount:
                                          type: number
                                          description: Price amount in this currency. Set explicitly per currency, not
                                            converted from the base amount.
                                      required:
                                        - currency
                                        - amount
                                    description: Base price amounts in additional currencies. The base 'amount' is
                                      in the org's default currency.
                                required:
                                  - amount
                                  - interval
                                title: BasePrice
                                description: Base price configuration for a plan.
                              - type: "null"
                            description: Override the base price of the plan. Pass null to remove the base
                              price.
                          items:
                            type: array
                            items:
                              type: object
                              properties:
                                feature_id:
                                  type: string
                                  description: The ID of the feature to configure.
                                included:
                                  type: number
                                  description: Number of free units included. Balance resets to this each interval
                                    for consumable features.
                                unlimited:
                                  type: boolean
                                  description: If true, customer has unlimited access to this feature.
                                reset:
                                  type: object
                                  properties:
                                    interval:
                                      enum:
                                        - one_off
                                        - minute
                                        - hour
                                        - day
                                        - week
                                        - month
                                        - quarter
                                        - semi_annual
                                        - year
                                      type: string
                                      description: Interval at which balance resets (e.g. 'month', 'year'). For
                                        consumable features only.
                                    interval_count:
                                      type: number
                                      description: Number of intervals between resets. Defaults to 1.
                                  required:
                                    - interval
                                  description: Reset configuration for consumable features. Omit for
                                    non-consumable features like seats.
                                price:
                                  type: object
                                  properties:
                                    amount:
                                      type: number
                                      description: Price per billing_units after included usage. Either 'amount' or
                                        'tiers' is required.
                                    additional_currencies:
                                      type: array
                                      items:
                                        type: object
                                        properties:
                                          currency:
                                            type: string
                                            description: Three-letter Stripe-supported currency code (e.g. 'eur', 'gbp').
                                          amount:
                                            type: number
                                            description: Price amount in this currency. Set explicitly per currency, not
                                              converted from the base amount.
                                        required:
                                          - currency
                                          - amount
                                      description: Amounts in additional currencies for this flat price. The base
                                        'amount' is in the org's default
                                        currency. Only valid with 'amount', not
                                        'tiers'.
                                    tiers:
                                      type: array
                                      items:
                                        type: object
                                        properties:
                                          to:
                                            anyOf:
                                              - type: number
                                              - const: inf
                                          amount:
                                            type: number
                                          flat_amount:
                                            type: number
                                          additional_currencies:
                                            type: array
                                            items:
                                              type: object
                                              properties:
                                                currency: {}
                                                amount: {}
                                                flat_amount: {}
                                            description: Per-currency amounts for this tier. Tier boundaries ('to') are
                                              shared across all currencies.
                                        required:
                                          - to
                                      description: Tiered pricing.  Either 'amount' or 'tiers' is required.
                                    tier_behavior:
                                      enum:
                                        - graduated
                                        - volume
                                      type: string
                                    interval:
                                      enum:
                                        - one_off
                                        - week
                                        - month
                                        - quarter
                                        - semi_annual
                                        - year
                                      type: string
                                      description: Billing interval. For consumable features, should match
                                        reset.interval.
                                    interval_count:
                                      type: number
                                      default: 1
                                      description: Number of intervals per billing cycle. Defaults to 1.
                                    billing_units:
                                      type: number
                                      default: 1
                                      description: Units per price increment. Usage is rounded UP when billed (e.g.
                                        billing_units=100 means 101 rounds to
                                        200).
                                    billing_method:
                                      enum:
                                        - prepaid
                                        - usage_based
                                      type: string
                                      description: "'prepaid' for upfront payment (seats), 'usage_based' for
                                        pay-as-you-go."
                                    max_purchase:
                                      anyOf:
                                        - type: number
                                        - type: "null"
                                      description: Max units purchasable beyond included. E.g. included=100,
                                        max_purchase=300 allows 400 total. Null
                                        for no limit.
                                  required:
                                    - interval
                                    - billing_method
                                  description: Pricing for usage beyond included units. Omit for free features.
                                proration:
                                  type: object
                                  properties:
                                    on_increase:
                                      enum:
                                        - bill_immediately
                                        - prorate_immediately
                                        - prorate_next_cycle
                                        - bill_next_cycle
                                      type: string
                                      description: Billing behavior when quantity increases mid-cycle.
                                    on_decrease:
                                      enum:
                                        - prorate
                                        - prorate_immediately
                                        - prorate_next_cycle
                                        - none
                                        - no_prorations
                                      type: string
                                      description: Credit behavior when quantity decreases mid-cycle.
                                  required:
                                    - on_increase
                                    - on_decrease
                                  description: Proration settings for prepaid features. Controls mid-cycle
                                    quantity change billing.
                                rollover:
                                  type: object
                                  properties:
                                    max:
                                      type: number
                                      description: Max rollover units. Omit for unlimited rollover.
                                    max_percentage:
                                      type: number
                                      description: Maximum rollover as a percentage (0-100) of included + prepaid
                                        grant. Mutually exclusive with max.
                                    expiry_duration_type:
                                      enum:
                                        - month
                                        - forever
                                      type: string
                                      description: When rolled over units expire.
                                    expiry_duration_length:
                                      type: number
                                      description: Number of periods before expiry.
                                  required:
                                    - expiry_duration_type
                                  description: Rollover config for unused units. If set, unused included units
                                    carry over.
                              required:
                                - feature_id
                              title: PlanItem
                              description: Configuration for a feature item in a plan, including usage limits,
                                pricing, and rollover settings.
