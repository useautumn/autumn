  /v1/plans.delete:
    post:
      operationId: deletePlan
      summary: Delete a plan
      description: >-
        Deletes a plan by its ID.


        Use this to permanently remove a plan. Plans with active customers
        cannot be deleted - archive them instead.
      tags:
        - plans
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                plan_id:
                  type: string
                  minLength: 1
                  description: The ID of the plan to delete.
                all_versions:
                  type: boolean
                  default: false
                  description: If true, deletes all versions of the plan. Otherwise, only deletes
                    the latest version.
              required:
                - plan_id
              title: DeletePlanParams
              examples:
                - &a19
                  plan_id: unused_plan
                - plan_id: legacy_plan
                  all_versions: true
            example: *a19
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required:
                  - success
      x-speakeasy-name-override: delete
      parameters:
        - *a5
      x-codeSamples:
        - lang: typescript
          label: Typescript (SDK)
          source: |-
            import { Autumn } from 'autumn-js'

            const autumn = new Autumn()

            const result = await autumn.plans.delete({
              planId: "unused_plan",
            });
        - lang: python
          label: Python (SDK)
          source: |-
            from autumn_sdk import Autumn

            autumn = Autumn(secret_key="am_sk_test...")

            res = autumn.plans.delete(
                plan_id="unused_plan",
                all_versions=False,
            )
  /v1/features.create:
    post:
      operationId: createFeature
      description: >-
        Creates a new feature.


        Use this to programmatically create features for metering usage,
        managing access, or building credit systems.
      tags:
        - features
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: The name of the feature.
                type:
                  enum:
                    - boolean
                    - metered
                    - credit_system
                    - ai_credit_system
                  type: string
                  description: The type of the feature. 'single_use' features are consumed, like
                    API calls, tokens, or messages. 'continuous_use' features
                    are allocated, like seats, workspaces, or projects.
                    'credit_system' features are schemas that unify multiple
                    'single_use' features into a single credit system.
                consumable:
                  type: boolean
                  description: Whether this feature is consumable. A consumable feature is one
                    that periodically resets and is consumed rather than
                    allocated (like credits, API requests, etc.). Applicable
                    only for 'metered' features.
                display:
                  type: object
                  properties:
                    singular:
                      type: string
                    plural:
                      type: string
                  required:
                    - singular
                    - plural
                  description: Singular and plural display names for the feature in your user
                    interface.
                credit_schema:
                  type: array
                  items:
                    type: object
                    properties:
                      metered_feature_id:
                        type: string
                      credit_cost:
