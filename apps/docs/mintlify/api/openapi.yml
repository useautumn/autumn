                action:
                  enum:
                    - confirm
                    - release
                  type: string
                  description: Use 'confirm' to commit the deduction, or 'release' to return the
                    held balance.
                override_value:
                  type: number
                  description: Additional properties to attach to this finalize lock event.
                properties:
                  type: object
                  propertyNames:
                    type: string
                  additionalProperties: {}
                  description: Additional properties to attach to this finalize lock event.
              required:
                - lock_id
                - action
