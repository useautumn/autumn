                          feature_id:
                            type: string
                            description: The ID of the feature (credit balance) to auto top-up.
                          enabled:
                            type: boolean
                            default: false
                            description: Whether auto top-up is enabled.
                          threshold:
                            type: number
                            minimum: 0
