                    page; use next_cursor from a prior response for subsequent
                    pages.
                limit:
                  type: integer
                  minimum: 1
                  maximum: 5000
                  default: 50
                  description: Number of items to return. Default 50, hard ceiling 5000.
                plans:
                  type: array
