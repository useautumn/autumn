  billing.auto_topup_failed:
    post:
      operationId: billingAutoTopupFailed
      summary: Auto Top-Up Failed
      description: Fired when an automatic top-up is blocked, declined, or fails
        before granting additional prepaid balance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - data
              properties:
                type:
                  type: string
                  const: billing.auto_topup_failed
                  description: The webhook event type.
                data:
                  examples:
                    - customer_id: cus_123
                      feature_id: messages
                      reason: charge_failed
                      quantity: 100
                      threshold: 20
                      balance: 15
                      invoice_mode: false
                      error:
                        code: card_declined
                        message: Your card was declined.
                        type: card_error
                        decline_code: generic_decline
                  type: object
                  properties:
                    customer_id:
                      description: The ID of the customer whose auto top-up failed.
                      type: string
                    feature_id:
                      description: The feature ID that Autumn attempted to auto top-up.
                      type: string
                    reason:
                      description: Machine-readable reason the automatic top-up did not grant balance.
                      type: string
                      enum:
                        - charge_failed
                        - purchase_limit_reached
                        - attempt_limit_reached
                        - failed_attempt_limit_reached
                        - customer_unavailable
                        - configuration_unavailable
                        - missing_payment_method
                        - missing_customer_product
                        - invalid_amount
                        - lock_contention
                        - redis_unavailable
                        - execution_error
                    quantity:
                      description: The normalized amount of balance Autumn attempted to grant, when a
                        matching auto top-up config was available.
                      anyOf:
                        - type: number
                        - type: "null"
                    threshold:
                      description: The configured balance threshold for the auto top-up, when
                        available.
                      anyOf:
                        - type: number
                        - type: "null"
                    balance:
                      description: The customer's remaining balance for the feature at the time the
                        failure was detected, when available.
                      anyOf:
                        - type: number
                        - type: "null"
                    invoice_mode:
                      description: Whether the auto top-up was configured to create a send_invoice
                        invoice instead of auto-charging.
                      anyOf:
                        - type: boolean
                        - type: "null"
                    error:
                      description: Sanitized provider or Autumn error metadata, when the failure came
                        from an exception or declined charge.
                      anyOf:
                        - type: object
                          properties:
                            code:
                              description: Machine-readable error code when one is available (for example, a
                                Stripe or Autumn error code).
                              anyOf:
                                - type: string
                                - type: "null"
                            message:
                              description: Sanitized error message with details about why the auto top-up
                                failed.
                              anyOf:
                                - type: string
                                - type: "null"
                            type:
                              description: Provider error type when one is available.
                              anyOf:
                                - type: string
                                - type: "null"
                            decline_code:
                              description: Stripe decline code when the failure came from a card decline.
                              anyOf:
                                - type: string
                                - type: "null"
                          additionalProperties: false
                        - type: "null"
                  required:
                    - customer_id
                    - feature_id
                    - reason
                  additionalProperties: false
            example:
              type: billing.auto_topup_failed
              data:
                customer_id: cus_123
                feature_id: messages
                reason: charge_failed
                quantity: 100
                threshold: 20
                balance: 15
                invoice_mode: false
                error:
                  code: card_declined
                  message: Your card was declined.
                  type: card_error
                  decline_code: generic_decline
      responses:
        "200":
          description: Webhook received successfully.
  billing.auto_topup_succeeded:
    post:
      operationId: billingAutoTopupSucceeded
      summary: Auto Top-Up Succeeded
      description: Fired when an automatic top-up grants additional prepaid balance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - data
              properties:
                type:
                  type: string
                  const: billing.auto_topup_succeeded
                  description: The webhook event type.
                data:
                  examples:
                    - customer_id: cus_123
                      feature_id: messages
                      quantity_granted: 100
                      threshold: 20
                      balance_after: 115
                      invoice_mode: false
                      invoice:
                        stripe_id: in_1A2B3C4D5E6F7G8H
                        status: paid
                        total: 1000
                        currency: usd
                        hosted_invoice_url: https://invoice.stripe.com/i/acct_123/test_456
                  type: object
                  properties:
                    customer_id:
                      description: The ID of the customer whose balance was topped up.
                      type: string
                    feature_id:
                      description: The feature ID that was automatically topped up.
                      type: string
                    quantity_granted:
                      description: The normalized amount of balance granted by the top-up.
                      type: number
                    threshold:
                      description: The configured balance threshold that triggered the top-up.
                      type: number
                    balance_after:
                      description: The customer's remaining balance for the feature after the top-up.
                      type: number
                    invoice_mode:
                      description: Whether the auto top-up created a send_invoice invoice instead of
                        auto-charging.
                      type: boolean
                    invoice:
                      description: The invoice created for the auto top-up.
                      type: object
                      properties:
                        stripe_id:
                          description: The Stripe invoice ID. Use this as a stable dedupe key.
                          type: string
                        status:
                          description: The status of the invoice. "paid" for auto-charged top-ups; "open"
                            for invoice-mode top-ups where credits were granted
                            but the invoice has not yet been paid.
                          anyOf:
                            - type: string
                            - type: "null"
                        total:
                          description: The total amount of the invoice in the smallest currency unit (e.g.
                            cents for USD), matching Stripe's invoice.total.
                          type: number
                        currency:
                          description: The ISO currency code for the invoice.
                          type: string
                        hosted_invoice_url:
                          description: URL to the hosted invoice page, if available.
                          anyOf:
                            - type: string
                            - type: "null"
                      required:
                        - stripe_id
                        - total
                        - currency
                      additionalProperties: false
                  required:
                    - customer_id
                    - feature_id
                    - quantity_granted
                    - threshold
                    - balance_after
                    - invoice_mode
                    - invoice
                  additionalProperties: false
            example:
              type: billing.auto_topup_succeeded
              data:
                customer_id: cus_123
                feature_id: messages
                quantity_granted: 100
                threshold: 20
                balance_after: 115
                invoice_mode: false
                invoice:
                  stripe_id: in_1A2B3C4D5E6F7G8H
                  status: paid
                  total: 1000
                  currency: usd
                  hosted_invoice_url: https://invoice.stripe.com/i/acct_123/test_456
      responses:
        "200":
          description: Webhook received successfully.
  billing.updated:
    post:
      operationId: billingUpdated
      summary: Plans Updated
      description: Fired when a customer's plans change — activated, scheduled,
        updated, or expired. Each event carries a `plan_changes` array
        describing what happened and a `tags` array (e.g. `trial_ended`,
        `phase_changed`) describing why.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - data
              properties:
                type:
                  type: string
                  const: billing.updated
                  description: The webhook event type.
                data:
                  examples:
                    - object: billing.updated
                      customer_id: cus_123
                      plan_changes:
                        - action: activated
                          subscription:
                            plan_id: pro
                            status: active
                            past_due: false
                            started_at: 1779000000000
                            canceled_at: null
                            expires_at: null
                            trial_ends_at: null
                            current_period_start: 1779000000000
                            current_period_end: 1781592000000
                          previous_attributes: null
                          item_changes: []
                        - action: expired
                          subscription:
                            plan_id: free
                            status: expired
                            past_due: false
                            started_at: 1776000000000
                            canceled_at: 1779000000000
                            expires_at: 1779000000000
                            trial_ends_at: null
                            current_period_start: null
                            current_period_end: null
                          previous_attributes:
                            status: active
                          item_changes: []
                      tags: []
                  type: object
                  properties:
                    object:
                      type: string
                      const: billing.updated
                    customer_id:
                      description: The ID of the customer whose plans changed.
                      type: string
                    entity_id:
                      description: The ID of the entity, if the changes are scoped to a specific
                        entity.
                      anyOf:
                        - type: string
                        - type: "null"
                    plan_changes:
                      description: The plans that were activated, scheduled, updated, or expired.
                      type: array
                      items:
                        type: object
                        properties:
                          action:
                            description: "The lifecycle action applied to this plan: activated (newly active
                              on the customer), scheduled (queued for a future
                              start), updated (mutated in place), or expired
                              (ended)."
                            type: string
                            enum:
                              - activated
                              - scheduled
                              - updated
                              - expired
                          subscription:
                            description: The subscription as it stands after this change. Present when the
                              plan is billed as a recurring subscription.
                            type: object
                            properties:
                              plan_id:
                                description: The ID of the customer plan.
                                type: string
                              status:
                                description: The current status of the subscription on the customer.
                                type: string
                                enum:
                                  - active
                                  - scheduled
                                  - expired
                              past_due:
                                description: Whether the subscription has overdue payments.
                                type: boolean
                              started_at:
                                description: When the subscription started, in milliseconds since the Unix
                                  epoch.
                                anyOf:
                                  - type: number
                                  - type: "null"
                              canceled_at:
                                description: When the subscription was canceled, in milliseconds since the Unix
                                  epoch, or null if not canceled.
                                anyOf:
                                  - type: number
                                  - type: "null"
                              expires_at:
                                description: When the subscription ends, in milliseconds since the Unix epoch,
                                  or null if no expiry is set.
                                anyOf:
                                  - type: number
                                  - type: "null"
                              trial_ends_at:
                                description: When the trial ends, in milliseconds since the Unix epoch. Null
                                  when not actively trialing.
                                anyOf:
                                  - type: number
                                  - type: "null"
                              current_period_start:
                                description: Start of the current billing period, or null if not applicable.
                                anyOf:
                                  - type: number
                                  - type: "null"
                              current_period_end:
                                description: End of the current billing period, or null if not applicable.
                                anyOf:
                                  - type: number
                                  - type: "null"
                            required:
                              - plan_id
                              - status
                              - past_due
                              - started_at
                              - canceled_at
                              - expires_at
                              - trial_ends_at
                              - current_period_start
                              - current_period_end
                            additionalProperties: false
                          purchase:
                            description: The purchase as it stands after this change. Present when the plan
                              is a one-off purchase.
                            type: object
                            properties:
                              plan_id:
                                description: The ID of the customer plan.
                                type: string
                              status:
                                description: The current status of the purchase on the customer.
                                type: string
                                enum:
                                  - active
                                  - scheduled
                                  - expired
                              expires_at:
                                description: When the purchase ends, in milliseconds since the Unix epoch, or
                                  null if no expiry is set.
                                anyOf:
                                  - type: number
                                  - type: "null"
                            required:
                              - plan_id
                              - status
                              - expires_at
                            additionalProperties: false
                          previous_attributes:
                            description: Sparse map of scalar fields whose values changed, holding their
                              previous values. Null when the plan is newly
                              activated or scheduled.
                            anyOf:
                              - type: object
                                propertyNames:
                                  type: string
                                additionalProperties: {}
                              - type: "null"
                          item_changes:
                            description: Features that were added to or removed from this plan. Only
                              populated for updated plans.
                            default: []
                            type: array
                            items:
                              type: object
                              properties:
                                action:
                                  description: Whether the feature was added to or removed from the plan.
                                  type: string
                                  enum:
                                    - created
                                    - deleted
                                feature_id:
                                  description: The ID of the feature that was added or removed.
                                  type: string
                                item:
                                  description: The item snapshot that was added or removed.
                                  type: object
                                  properties:
                                    feature_id:
                                      description: The ID of the feature this item configures.
                                      type: string
                                    feature:
                                      description: The full feature object if expanded.
                                      type: object
                                      properties:
                                        id:
                                          description: The ID of the feature, used to refer to it in other API calls like
                                            /track or /check.
                                          type: string
                                        name:
                                          description: The name of the feature.
                                          anyOf:
                                            - type: string
                                            - type: "null"
                                        type:
                                          description: The type of the feature
                                          type: string
                                          enum:
                                            - static
                                            - boolean
                                            - single_use
                                            - continuous_use
                                            - credit_system
                                            - ai_credit_system
                                        display:
                                          description: Singular and plural display names for the feature.
                                          anyOf:
                                            - type: object
                                              properties:
                                                singular:
                                                  description: The singular display name for the feature.
                                                  type: string
                                                plural:
                                                  description: The plural display name for the feature.
                                                  type: string
                                              required:
                                                - singular
                                                - plural
                                              additionalProperties: false
                                            - type: "null"
                                        credit_schema:
                                          description: Credit cost schema for credit system features.
                                          anyOf:
                                            - type: array
                                              items:
                                                type: object
                                                properties:
                                                  metered_feature_id:
                                                    description: The ID of the metered feature (should be a single_use feature).
                                                    type: string
                                                  credit_cost:
                                                    description: The credit cost of the metered feature.
                                                    type: number
                                                required:
                                                  - metered_feature_id
                                                  - credit_cost
                                                additionalProperties: false
                                            - type: "null"
                                        archived:
                                          description: Whether or not the feature is archived.
                                          anyOf:
                                            - type: boolean
                                            - type: "null"
                                      required:
                                        - id
                                        - type
                                      additionalProperties: false
                                    included:
                                      description: Number of free units included. For consumable features, balance
                                        resets to this number each interval.
                                      type: number
                                    unlimited:
                                      description: Whether the customer has unlimited access to this feature.
                                      type: boolean
                                    reset:
                                      description: Reset configuration for consumable features. Null for
                                        non-consumable features like seats where
                                        usage persists across billing cycles.
                                      anyOf:
                                        - type: object
                                          properties:
                                            interval:
                                              description: The interval at which the feature balance resets (e.g. 'month',
                                                'year'). For consumable
                                                features, usage resets to 0 and
                                                included units are restored.
                                              type: string
                                              enum:
                                                - one_off
                                                - minute
                                                - hour
                                                - day
                                                - week
                                                - month
                                                - quarter
                                                - semi_annual
                                                - year
                                            interval_count:
                                              description: Number of intervals between resets. Defaults to 1.
                                              type: number
                                          required:
                                            - interval
                                          additionalProperties: false
                                        - type: "null"
                                    price:
                                      description: Pricing configuration for usage beyond included units. Null if
                                        feature is entirely free.
                                      anyOf:
                                        - type: object
                                          properties:
                                            amount:
                                              description: Price per billing_units after included usage is consumed. Mutually
                                                exclusive with tiers.
                                              type: number
                                            additional_currencies:
                                              description: Amounts in additional currencies for this flat price. The base
                                                'amount' is in the org's default
                                                currency. Only valid with
                                                'amount', not 'tiers' (tiered
                                                prices carry per-currency
                                                amounts on each tier).
                                              type: array
                                              items:
                                                type: object
                                                properties:
                                                  currency:
                                                    description: Three-letter Stripe-supported currency code (e.g. 'eur', 'gbp').
                                                    type: string
                                                  amount:
                                                    description: Price amount in this currency. Set explicitly per currency, not
                                                      converted from the base
                                                      amount.
                                                    type: number
                                                required:
                                                  - currency
                                                  - amount
                                                additionalProperties: false
                                            tiers:
                                              description: Tiered pricing configuration. Each tier's 'to' INCLUDES the
                                                included amount. Either 'tiers'
                                                or 'amount' is required.
                                              type: array
                                              items:
                                                type: object
                                                properties:
                                                  to:
                                                    anyOf:
                                                      - type: number
                                                      - type: string
                                                        const: inf
                                                  amount:
                                                    type: number
                                                  flat_amount:
                                                    type: number
                                                  additional_currencies:
                                                    type: array
                                                    items:
                                                      type: object
                                                      properties:
                                                        currency:
                                                          description: Three-letter Stripe-supported currency code (e.g. 'eur', 'gbp').
                                                          type: string
                                                        amount:
                                                          description: Per-unit amount for this tier in this currency.
                                                          type: number
                                                        flat_amount:
                                                          description: Flat amount for this tier in this currency, if the tier uses one.
                                                          type: number
                                                      required:
                                                        - currency
                                                      additionalProperties: false
                                                required:
                                                  - to
                                                  - amount
                                                additionalProperties: false
                                            tier_behavior:
                                              type: string
                                              enum:
                                                - graduated
                                                - volume
                                            interval:
                                              description: Billing interval for this price. For consumable features, should
                                                match reset.interval.
                                              type: string
                                              enum:
                                                - one_off
                                                - week
                                                - month
                                                - quarter
                                                - semi_annual
                                                - year
                                            interval_count:
                                              description: Number of intervals per billing cycle. Defaults to 1.
                                              type: number
                                            billing_units:
                                              description: Number of units per price increment. Usage is rounded UP to the
                                                nearest billing_units when
                                                billed (e.g. billing_units=100
                                                means 101 usage rounds to 200).
                                              type: number
                                            billing_method:
                                              description: "'prepaid' for features like seats where customers pay upfront,
                                                'usage_based' for pay-as-you-go
                                                after included usage."
                                              type: string
                                              enum:
                                                - prepaid
                                                - usage_based
                                            max_purchase:
                                              description: Maximum units a customer can purchase beyond included. E.g. if
                                                included=100 and
                                                max_purchase=300, customer can
                                                use up to 400 total before usage
                                                is capped. Null for no limit.
                                              anyOf:
                                                - type: number
                                                - type: "null"
                                          required:
                                            - interval
                                            - billing_units
                                            - billing_method
                                            - max_purchase
                                          additionalProperties: false
                                        - type: "null"
                                    display:
                                      description: Display text for showing this item in pricing pages.
                                      type: object
                                      properties:
                                        primary_text:
                                          description: Main display text (e.g. '$10' or '100 messages').
                                          type: string
                                        secondary_text:
                                          description: Secondary display text (e.g. 'per month' or 'then $0.5 per 100').
                                          type: string
                                      required:
                                        - primary_text
                                      additionalProperties: false
                                    rollover:
                                      description: Rollover configuration for unused units. If set, unused included
                                        units roll over to the next period.
                                      type: object
                                      properties:
                                        max:
                                          description: Maximum rollover units. Null for unlimited rollover.
                                          anyOf:
                                            - type: number
                                            - type: "null"
                                        max_percentage:
                                          description: Maximum rollover as a percentage (0-100) of included + prepaid
                                            grant. Mutually exclusive with max.
                                          anyOf:
                                            - type: number
                                            - type: "null"
                                        expiry_duration_type:
                                          description: When rolled over units expire.
                                          type: string
                                          enum:
                                            - month
                                            - forever
                                        expiry_duration_length:
                                          description: Number of periods before expiry.
                                          type: number
                                      required:
                                        - max
                                        - expiry_duration_type
                                      additionalProperties: false
                                  required:
                                    - feature_id
                                    - included
                                    - unlimited
                                    - reset
                                    - price
                                  additionalProperties: false
                              required:
                                - action
                                - feature_id
                                - item
                              additionalProperties: false
                        required:
                          - action
                          - previous_attributes
                          - item_changes
                        additionalProperties: false
                    tags:
                      description: Reason tags describing why this event fired (e.g. 'trial_ended',
                        'phase_changed'). Always present; empty when no specific
                        reason applies.
                      default: []
                      type: array
                      items:
                        type: string
                  required:
                    - object
                    - customer_id
                    - plan_changes
                    - tags
                  additionalProperties: false
            example:
              type: billing.updated
              data:
                object: billing.updated
                customer_id: cus_123
                plan_changes:
                  - action: activated
                    subscription:
                      plan_id: pro
                      status: active
                      past_due: false
                      started_at: 1779000000000
                      canceled_at: null
                      expires_at: null
                      trial_ends_at: null
                      current_period_start: 1779000000000
                      current_period_end: 1781592000000
                    previous_attributes: null
                    item_changes: []
                  - action: expired
                    subscription:
                      plan_id: free
                      status: expired
                      past_due: false
                      started_at: 1776000000000
                      canceled_at: 1779000000000
                      expires_at: 1779000000000
                      trial_ends_at: null
                      current_period_start: null
                      current_period_end: null
                    previous_attributes:
                      status: active
                    item_changes: []
                tags: []
      responses:
        "200":
          description: Webhook received successfully.
  vercel.resources.deleted:
    post:
      operationId: vercelResourcesDeleted
      summary: Resource Deleted
      description: When a Vercel resource is deleted, you'll need to handle
        de-provisioning any API keys or other non-Autumn controlled data for
        this user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - data
              properties:
                type:
                  type: string
                  const: vercel.resources.deleted
                  description: The webhook event type.
                data:
                  type: object
                  properties:
                    resource:
                      description: The resource that was deleted.
                      type: object
                      properties:
                        id:
                          description: The unique identifier of the deleted resource.
                          type: string
                      required:
                        - id
                      additionalProperties: false
                    installation_id:
                      description: The Vercel integration configuration ID.
                      type: string
                  required:
                    - resource
                    - installation_id
                  additionalProperties: false
      responses:
        "200":
          description: Webhook received successfully.
  vercel.resources.provisioned:
    post:
      operationId: vercelResourcesProvisioned
      summary: Resource Provisioned
      description: When a Vercel resource is created, you'll need to provision a
        secret key for your service. Then you can use the provided access token
        to patch the resource's secrets.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - data
              properties:
                type:
                  type: string
                  const: vercel.resources.provisioned
                  description: The webhook event type.
                data:
                  type: object
                  properties:
                    resource:
                      description: The resource that was provisioned.
                      type: object
                      properties:
                        id:
                          description: The unique identifier of the provisioned resource.
                          type: string
                        name:
                          description: The display name of the provisioned resource.
                          type: string
                      required:
                        - id
                        - name
                      additionalProperties: false
                    installation_id:
                      description: The Vercel integration configuration ID.
                      type: string
                    access_token:
                      description: An access token that can be used to patch the resource's secrets.
                      type: string
                  required:
                    - resource
                    - installation_id
                    - access_token
                  additionalProperties: false
      responses:
        "200":
          description: Webhook received successfully.
  vercel.resources.rotate_secrets:
    post:
      operationId: vercelResourcesRotateSecrets
      summary: Rotate Secrets
      description: This event is sent when Vercel requires a resource's secrets to be
        rotated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - data
              properties:
                type:
                  type: string
                  const: vercel.resources.rotate_secrets
                  description: The webhook event type.
                data:
                  type: object
                  properties:
                    resource:
                      description: The resource whose secrets should be rotated.
                      type: object
                      properties:
                        id:
                          description: The unique identifier of the resource.
                          type: string
                      required:
                        - id
                      additionalProperties: false
                    installation_id:
                      description: The Vercel integration configuration ID.
                      type: string
                    vercel_request_body:
                      description: The raw request body from Vercel's rotation request.
                  required:
                    - resource
                    - installation_id
                    - vercel_request_body
                  additionalProperties: false
      responses:
        "200":
          description: Webhook received successfully.
  vercel.webhooks.event:
    post:
      operationId: vercelWebhooksEvent
      summary: Webhook Event
      description: Passthrough webhook for Vercel events.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - type
                - data
              properties:
                type:
                  type: string
                  const: vercel.webhooks.event
                  description: The webhook event type.
                data:
                  type: object
                  properties:
                    installation_id:
                      description: The Vercel integration configuration ID.
                      type: string
                    event:
                      description: The raw Vercel webhook event payload.
                  required:
                    - installation_id
                    - event
                  additionalProperties: false
      responses:
        "200":
          description: Webhook received successfully.
