  /v1/billing.multi_update:
    post:
      operationId: multiUpdate
      description: >-
        Updates multiple plans on a customer in a single request. Currently
        supports cancel actions (immediately, end of cycle, or uncancel) across
        one or more subscriptions.


        Use this endpoint to cancel or uncancel several plans atomically in one
        call — for example canceling a main plan together with its add-ons, or
        plans across multiple entities.
      tags:
        - billing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customer_id:
                  type: string
                  description: The ID of the customer to update plans for.
                entity_id:
                  type: string
                  description: The ID of the entity to update plans for. Individual updates can
                    override this with their own entity_id.
                updates:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    properties:
                      plan_id:
                        type: string
                        description: The ID of the plan to update. Optional if subscription_id is
                          provided.
                      subscription_id:
                        type: string
                        description: A unique ID to identify the subscription to update. Useful when a
                          customer has multiple products with the same plan.
                      entity_id:
                        type: string
                        description: The ID of the entity this update targets. Overrides the top-level
                          entity_id for this update.
                      cancel_action:
                        enum:
                          - cancel_immediately
                          - cancel_end_of_cycle
                          - uncancel
                        type: string
                        title: CancelAction
                        description: Action to perform for cancellation. 'cancel_immediately' cancels
                          now with prorated refund, 'cancel_end_of_cycle'
                          cancels at period end, 'uncancel' reverses a pending
                          cancellation.
                      proration_behavior:
                        enum:
                          - prorate_immediately
                          - none
                        type: string
                        description: How to handle proration for this update. 'prorate_immediately'
                          charges/credits prorated amounts now, 'none' skips
                          creating any charges.
                    required:
                      - cancel_action
                  description: The list of plan updates to apply to the customer.
              required:
                - customer_id
                - updates
              title: MultiUpdateParams
              examples:
                - &a43
                  customer_id: cus_123
                  updates:
                    - plan_id: pro_plan
                      cancel_action: cancel_end_of_cycle
                    - plan_id: addon_seats
                      cancel_action: cancel_end_of_cycle
            example: *a43
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  customer_id:
                    type: string
                    description: The ID of the customer.
                  entity_id:
                    type: string
                    description: The ID of the entity, if the plan was attached to an entity.
                  invoice:
                    type: object
                    properties:
                      status:
                        anyOf:
                          - type: string
                          - type: "null"
                        description: The status of the invoice (e.g., 'paid', 'open', 'draft').
                      stripe_id:
                        type: string
                        description: The Stripe invoice ID.
                      total:
                        type: number
                        description: The total amount of the invoice in cents.
                      currency:
                        type: string
                        description: The three-letter ISO currency code (e.g., 'usd').
                      hosted_invoice_url:
                        anyOf:
                          - type: string
                          - type: "null"
                        description: URL to the hosted invoice page where the customer can view and pay
                          the invoice.
                    required:
                      - status
                      - stripe_id
                      - total
                      - currency
                      - hosted_invoice_url
                    description: Invoice details if an invoice was created. Only present when a
                      charge was made.
                  payment_url:
                    anyOf:
                      - type: string
                      - type: "null"
                    description: URL to redirect the customer to complete payment. Null if no
                      payment action is required.
                  required_action:
                    type: object
                    properties:
                      code:
                        enum:
                          - 3ds_required
                          - payment_method_required
                          - payment_failed
                          - payment_processing
                        type: string
                        description: The type of action required to complete the payment.
                      reason:
                        type: string
                        description: A human-readable explanation of why this action is required.
                    required:
                      - code
                      - reason
                    description: Details about any action required to complete the payment. Present
                      when the payment could not be processed automatically.
                required:
                  - customer_id
                  - payment_url
                examples:
                  - &a44
                    customer_id: cus_123
                    invoice:
                      status: paid
                      stripe_id: in_1234
                      total: -20
                      currency: usd
                      hosted_invoice_url: https://invoice.stripe.com/...
                    payment_url: null
              example: *a44
      x-speakeasy-name-override: multiUpdate
      parameters:
        - *a5
      x-codeSamples:
        - lang: typescript
          label: Typescript (SDK)
          source: |-
            import { Autumn } from 'autumn-js'

            const autumn = new Autumn()

            const result = await autumn.billing.multiUpdate({
              customerId: "cus_123",
              updates: [
                {
                  planId: "pro_plan",
                  cancelAction: "cancel_end_of_cycle",
                },
                {
                  planId: "addon_seats",
                  cancelAction: "cancel_end_of_cycle",
                },
              ],
            });
        - lang: python
          label: Python (SDK)
          source: |-
            from autumn_sdk import Autumn

            autumn = Autumn(secret_key="am_sk_test...")

            res = autumn.billing.multi_update(
                customer_id="cus_123",
                updates=[
                    {
                        "plan_id": "pro_plan",
                        "cancel_action": "cancel_end_of_cycle",
                    },
                    {
                        "plan_id": "addon_seats",
                        "cancel_action": "cancel_end_of_cycle",
                    },
                ],
            )
